<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicketStonks V6 - Pro</title>
    <style>
        :root {
            --bg: #0a0a0b;
            --bg-card: #141417;
            --accent: #f5c542;
            --text: #ffffff;
            --sub: #a1a1aa;
            --border: #27272a;
            --green: #22c55e;
            --red: #ef4444;
        }
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
        
        #loading, #auth-screen, #game-screen, #admin-panel { 
            display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; 
            position: fixed; width: 100%; top:0; left:0; 
        }
        .active { display: flex !important; }

        /* Loader */
        #loading { background: var(--bg); z-index: 1000; }
        .loader { 
            width: 48px; height: 48px; border: 5px solid #FFF; border-bottom-color: var(--accent); 
            border-radius: 50%; animation: rotation 1s linear infinite; 
        }
        @keyframes rotation { 0% { transform: rotate(0deg) } 100% { transform: rotate(360deg) } }

        /* Auth */
        #auth-screen { background: radial-gradient(circle at center, #1e1e24 0%, #0a0a0b 100%); }
        .auth-card { 
            background: var(--bg-card); padding: 2.5rem; border-radius: 20px; border: 1px solid var(--border); 
            width: 380px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        input { 
            width: 100%; padding: 14px; margin-bottom: 12px; background: #000; border: 1px solid var(--border); 
            border-radius: 10px; color: white; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--accent); }
        button { 
            width: 100%; padding: 14px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; 
        }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-primary:hover { transform: scale(1.02); opacity: 0.9; }
        .btn-link { background: transparent; color: var(--sub); font-size: 0.85rem; margin-top: 15px; }

        /* HUD */
        .top-bar { 
            position: fixed; top: 0; left: 0; right: 0; height: 80px; display: flex; align-items: center; 
            justify-content: space-between; padding: 0 2rem; background: rgba(10,10,11,0.9); 
            border-bottom: 1px solid var(--border); z-index: 100; backdrop-filter: blur(10px);
        }
        .user-stats { display: flex; align-items: center; gap: 20px; }
        .stat-item { display: flex; flex-direction: column; align-items: flex-start; }
        .stat-label { font-size: 0.7rem; color: var(--sub); text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-weight: 800; font-size: 1.2rem; color: var(--accent); }

        .xp-container { flex: 1; max-width: 400px; margin: 0 2rem; }
        .xp-header { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.8rem; font-weight: bold; }
        .xp-bar { height: 8px; background: #27272a; border-radius: 4px; overflow: hidden; }
        .xp-fill { height: 100%; background: linear-gradient(90deg, #f5c542, #fbbf24); width: 0%; transition: width 0.5s; }

        /* Game Layout */
        .game-main { margin-top: 80px; display: flex; gap: 2rem; padding: 2rem; height: calc(100vh - 80px); }
        .ticket-list { width: 350px; overflow-y: auto; padding-right: 10px; }
        .ticket-list::-webkit-scrollbar { width: 5px; }
        .ticket-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .ticket-card { 
            background: var(--bg-card); border: 1px solid var(--border); padding: 1.5rem; border-radius: 15px; 
            margin-bottom: 1rem; cursor: pointer; position: relative; overflow: hidden; transition: 0.3s;
        }
        .ticket-card:hover:not(.locked) { border-color: var(--accent); transform: translateX(5px); }
        .ticket-card.locked { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }
        .lock-badge { position: absolute; top: 10px; right: 10px; font-size: 0.7rem; background: var(--red); padding: 2px 8px; border-radius: 4px; }

        .scratch-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2rem; }
        #canvas-wrapper { 
            position: relative; width: 500px; height: 300px; background: #27272a; border-radius: 20px; 
            overflow: hidden; box-shadow: 0 25px 60px rgba(0,0,0,0.6); border: 2px solid var(--border);
        }
        #ticket-content { 
            position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            background: #fff; color: #000; text-align: center;
        }
        #win-amount { font-size: 4rem; font-weight: 900; margin-bottom: 10px; }
        #win-label { font-size: 1rem; font-weight: bold; color: var(--sub); text-transform: uppercase; }
        canvas { position: absolute; top:0; left:0; cursor: crosshair; touch-action: none; }

        /* Loan UI */
        .loan-btn { background: var(--red); color: white; margin-top: 10px; font-size: 0.8rem; }
        .admin-btn { position: fixed; bottom: 20px; right: 20px; width: auto; padding: 10px 20px; background: var(--bg-card); border: 1px solid var(--border); color: var(--sub); font-size: 0.7rem; }

        /* Admin Panel */
        #admin-panel { background: #000; color: #0f0; font-family: 'Courier New', monospace; padding: 2rem; overflow-y: auto; }
        .admin-header { width: 100%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #0f0; margin-bottom: 2rem; padding-bottom: 1rem; }
        .admin-table { width: 100%; border-collapse: collapse; }
        .admin-table th, .admin-table td { border: 1px solid #0f0; padding: 10px; text-align: left; }
        .close-admin { width: auto; background: #0f0; color: #000; padding: 5px 15px; }

        /* Notifications */
        #notif { position: fixed; top: 90px; right: 20px; padding: 15px 25px; border-radius: 10px; font-weight: bold; z-index: 200; transform: translateX(200%); transition: 0.5s; }
        #notif.show { transform: translateX(0); }
        .notif-success { background: var(--green); color: white; }
        .notif-error { background: var(--red); color: white; }
    </style>
</head>
<body>

    <div id="loading" class="active"><div class="loader"></div></div>

    <!-- Screen Auth -->
    <div id="auth-screen">
        <div class="auth-card" id="auth-container">
            <h1 style="margin-bottom: 1.5rem; font-size: 2rem; color: var(--accent);">TicketStonks V6</h1>
            <div id="auth-fields">
                <input type="text" id="username" placeholder="Nom d'utilisateur">
                <input type="password" id="password" placeholder="Mot de passe">
                <button class="btn-primary" onclick="handleAuth()">Connexion / Inscription</button>
            </div>
            <p style="color: var(--sub); font-size: 0.8rem; margin-top: 1rem;">La progression est sauvegardée localement.</p>
        </div>
    </div>

    <!-- Screen Game -->
    <div id="game-screen">
        <div class="top-bar">
            <div class="user-stats">
                <div class="stat-item">
                    <span class="stat-label">Crédits</span>
                    <span class="stat-value" id="hud-credits">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Niveau</span>
                    <span class="stat-value" id="hud-level">1</span>
                </div>
            </div>

            <div class="xp-container">
                <div class="xp-header">
                    <span id="hud-username">Joueur</span>
                    <span id="xp-text">0 / 100 XP</span>
                </div>
                <div class="xp-bar"><div id="xp-fill" class="xp-fill"></div></div>
            </div>

            <button class="btn-link" style="width:auto;" onclick="logout()">Déconnexion</button>
        </div>

        <div class="game-main">
            <div class="ticket-list" id="ticket-list">
                <!-- Dynamically filled -->
            </div>

            <div class="scratch-area">
                <div id="canvas-wrapper">
                    <div id="ticket-content">
                        <div id="win-amount">?</div>
                        <div id="win-label">Gain potentiel</div>
                    </div>
                    <canvas id="scratch-canvas"></canvas>
                </div>
                <div id="game-controls">
                    <p id="game-status" style="color: var(--sub); text-align: center; margin-bottom: 10px;">Sélectionnez un ticket pour commencer</p>
                    <button id="loan-btn" class="loan-btn" style="display:none;" onclick="takeLoan()">Emprunter 100 credits (Rembourser 200)</button>
                </div>
            </div>
        </div>
        <button class="admin-btn" onclick="openAdmin()">Terminal Admin</button>
    </div>

    <!-- Admin Panel -->
    <div id="admin-panel">
        <div class="admin-header">
            <h1>ADMIN TERMINAL V6.0</h1>
            <button class="close-admin" onclick="closeAdmin()">EXIT</button>
        </div>
        <div id="admin-content">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Password</th>
                        <th>Credits</th>
                        <th>Level</th>
                        <th>XP</th>
                        <th>Loan</th>
                    </tr>
                </thead>
                <tbody id="admin-user-list"></tbody>
            </table>
        </div>
    </div>

    <div id="notif"></div>

    <script>
        let db = JSON.parse(localStorage.getItem('ticketstonks_db')) || { users: {} };
        let currentUser = null;
        let isScratching = false;
        let scratchedPercentage = 0;
        let currentTicket = null;

        const TICKETS = [
            { id: 'classic', name: 'Classique', cost: 10, minLevel: 1, wins: [0, 2, 5, 10, 20, 50], color: '#a1a1aa' },
            { id: 'gold', name: 'Gold Rush', cost: 50, minLevel: 5, wins: [0, 10, 50, 100, 250, 500], color: '#f5c542' },
            { id: 'diamond', name: 'Diamond Jack', cost: 200, minLevel: 15, wins: [0, 50, 200, 500, 1000, 5000], color: '#3b82f6' }
        ];

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('loading').classList.remove('active');
                document.getElementById('auth-screen').classList.add('active');
            }, 1000);
        };

        function saveDB() {
            localStorage.setItem('ticketstonks_db', JSON.stringify(db));
        }

        function handleAuth() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();

            if(!user || !pass) return showNotif("Champs vides !", "error");

            if(db.users[user]) {
                if(db.users[user].password === pass) {
                    login(user);
                } else {
                    showNotif("Mot de passe incorrect", "error");
                }
            } else {
                db.users[user] = {
                    username: user,
                    password: pass,
                    credits: 100,
                    level: 1,
                    xp: 0,
                    hasLoan: false
                };
                saveDB();
                login(user);
                showNotif("Compte créé !", "success");
            }
        }

        function login(username) {
            currentUser = db.users[username];
            document.getElementById('auth-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
            updateHUD();
            renderTickets();
        }

        function logout() {
            currentUser = null;
            document.getElementById('game-screen').classList.remove('active');
            document.getElementById('auth-screen').classList.add('active');
        }

        function updateHUD() {
            if(!currentUser) return;
            document.getElementById('hud-credits').innerText = currentUser.credits;
            document.getElementById('hud-level').innerText = currentUser.level;
            document.getElementById('hud-username').innerText = currentUser.username;
            
            const nextLevelXP = currentUser.level * 100;
            const progress = (currentUser.xp / nextLevelXP) * 100;
            document.getElementById('xp-fill').style.width = progress + '%';
            document.getElementById('xp-text').innerText = `${currentUser.xp} / ${nextLevelXP} XP`;

            document.getElementById('loan-btn').style.display = (currentUser.credits < 10 && !currentUser.hasLoan) ? 'block' : 'none';
        }

        function renderTickets() {
            const list = document.getElementById('ticket-list');
            list.innerHTML = '';
            TICKETS.forEach(t => {
                const isLocked = currentUser.level < t.minLevel;
                const card = document.createElement('div');
                card.className = `ticket-card ${isLocked ? 'locked' : ''}`;
                card.innerHTML = `
                    <h3 style="color: ${t.color}">${t.name}</h3>
                    <p style="font-size: 0.9rem; color: var(--sub)">Coût: ${t.cost} credits</p>
                    ${isLocked ? `<div class="lock-badge">Niv. ${t.minLevel}</div>` : ''}
                `;
                if(!isLocked) card.onclick = () => startScratch(t);
                list.appendChild(card);
            });
        }

        function startScratch(ticket) {
            if(currentUser.credits < ticket.cost) return showNotif("Pas assez de crédits !", "error");
            if(isScratching) return;

            currentUser.credits -= ticket.cost;
            if(currentUser.hasLoan && currentUser.credits >= 200) {
                currentUser.credits -= 200;
                currentUser.hasLoan = false;
                showNotif("Prêt remboursé automatiquement (-200)!", "success");
            }
            
            saveDB();
            updateHUD();

            currentTicket = ticket;
            const win = ticket.wins[Math.floor(Math.random() * ticket.wins.length)];
            document.getElementById('win-amount').innerText = win > 0 ? win + '€' : 'PERDU';
            document.getElementById('win-label').innerText = win > 0 ? "Félicitations !" : "Dommage...";
            
            initCanvas(win);
        }

        function initCanvas(winValue) {
            const canvas = document.getElementById('scratch-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 500;
            canvas.height = 300;

            // Fill cover
            ctx.fillStyle = '#666';
            ctx.fillRect(0,0, canvas.width, canvas.height);
            ctx.fillStyle = '#444';
            for(let i=0; i<canvas.width; i+=20) {
                for(let j=0; j<canvas.height; j+=20) {
                    ctx.fillText('STOCKS', i, j);
                }
            }

            isScratching = true;
            let pixelsScratched = 0;

            function scratch(e) {
                if(!isScratching) return;
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || e.touches[0].clientX) - rect.left;
                const y = (e.clientY || e.touches[0].clientY) - rect.top;

                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath();
                ctx.arc(x, y, 30, 0, Math.PI * 2);
                ctx.fill();

                checkWin(canvas, winValue);
            }

            canvas.onmousedown = canvas.ontouchstart = () => { canvas.onmousemove = canvas.ontouchmove = scratch; };
            window.onmouseup = window.ontouchend = () => { canvas.onmousemove = canvas.ontouchmove = null; };
        }

        function checkWin(canvas, win) {
            if(!isScratching) return;
            const ctx = canvas.getContext('2d');
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            let clearPixels = 0;
            for(let i=3; i<imageData.data.length; i+=4) {
                if(imageData.data[i] === 0) clearPixels++;
            }
            
            const percent = (clearPixels / (canvas.width * canvas.height)) * 100;
            if(percent > 60) {
                finishGame(win);
            }
        }

        function finishGame(win) {
            isScratching = false;
            const canvas = document.getElementById('scratch-canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0,0, canvas.width, canvas.height);

            if(win > 0) {
                currentUser.credits += win;
                showNotif(`Gagné: ${win} credits!`, "success");
            }
            
            // XP
            currentUser.xp += 20;
            const nextLevelXP = currentUser.level * 100;
            if(currentUser.xp >= nextLevelXP) {
                currentUser.xp = 0;
                currentUser.level++;
                showNotif("NIVEAU SUPÉRIEUR !", "success");
            }

            saveDB();
            updateHUD();
            renderTickets();
            currentTicket = null;
        }

        function takeLoan() {
            if(currentUser.hasLoan) return;
            currentUser.credits += 100;
            currentUser.hasLoan = true;
            saveDB();
            updateHUD();
            showNotif("Prêt de 100 accordé ! À rembourser (200).", "success");
        }

        function showNotif(msg, type) {
            const n = document.getElementById('notif');
            n.innerText = msg;
            n.className = 'notif-' + type + ' show';
            setTimeout(() => n.className = '', 3000);
        }

        /* Admin Logic */
        function openAdmin() {
            const pass = prompt("Mot de passe Admin:");
            if(pass === "135975") {
                document.getElementById('admin-panel').classList.add('active');
                renderAdminUsers();
            } else {
                alert("Accès refusé");
            }
        }

        function renderAdminUsers() {
            const tbody = document.getElementById('admin-user-list');
            tbody.innerHTML = '';
            Object.values(db.users).forEach(u => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${u.username}</td>
                    <td style="color:#f00">${u.password}</td>
                    <td>${u.credits}</td>
                    <td>${u.level}</td>
                    <td>${u.xp}</td>
                    <td>${u.hasLoan ? 'OUI' : 'NON'}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function closeAdmin() {
            document.getElementById('admin-panel').classList.remove('active');
        }
    </script>
</body>
</html>
