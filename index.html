<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicketStonks V10 - Ultimate Pro Arcade</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@900,700,500,400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --blur: blur(20px);
            --primary: #5ac8a8;
            --secondary: #66a3ff;
            --gold: #f2c14e;
            --danger: #ff6b7a;
            --bg: #0b0c0e;
            --text: #ffffff;
            --muted: #9ca7b4;
            --radius: 1.5rem;
        }

        [data-theme="blue"] { --primary: #0084ff; --secondary: #00d2ff; }
        [data-theme="purple"] { --primary: #a855f7; --secondary: #ec4899; }
        [data-theme="gold"] { --primary: #fbbf24; --secondary: #f59e0b; }
        [data-theme="red"] { --primary: #ef4444; --secondary: #f87171; }

        * { box-sizing: border-box; user-select: none; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        body { font-family: 'Satoshi', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        
        .screen { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; z-index: 10; opacity: 0; transform: scale(0.95); }
        .screen.active { display: flex; opacity: 1; transform: scale(1); }

        .glass-card { background: var(--glass); backdrop-filter: var(--blur); border: 1px solid var(--glass-border); border-radius: var(--radius); padding: 2.5rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); width: 100%; max-width: 450px; text-align: center; }
        .app-container { width: 95%; max-width: 1400px; height: 90vh; display: grid; grid-template-columns: 320px 1fr 320px; gap: 1.5rem; }

        h1, h2, h3 { margin: 0; font-weight: 900; letter-spacing: -1px; }
        input { width: 100%; padding: 1rem; margin-bottom: 1rem; border-radius: 1rem; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); color: #fff; font-family: inherit; font-size: 1rem; }
        button { padding: 1rem 1.5rem; border-radius: 1rem; border: none; font-weight: 800; cursor: pointer; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        .btn-primary { background: var(--primary); color: #000; box-shadow: 0 10px 20px -5px var(--primary); }
        .btn-secondary { background: var(--glass); color: #fff; border: 1px solid var(--glass-border); }
        
        .sidebar { background: var(--glass); backdrop-filter: var(--blur); border: 1px solid var(--glass-border); border-radius: var(--radius); padding: 1.5rem; overflow-y: auto; }
        .main-game { display: flex; flex-direction: column; gap: 1.5rem; }
        .scratch-stage { flex: 1; background: #f6edd0; border-radius: 2rem; position: relative; overflow: hidden; cursor: crosshair; }
        #canvas { position: absolute; inset: 0; z-index: 5; }
        .underlay { position: absolute; inset: 0; display: grid; place-items: center; z-index: 1; }

        .stat-badge { background: rgba(0,0,0,0.5); padding: 0.5rem 1rem; border-radius: 2rem; border: 1px solid var(--glass-border); display: flex; align-items: center; gap: 0.5rem; }
        .level-bar { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; margin-top: 0.5rem; }
        .level-progress { height: 100%; background: var(--primary); width: 0%; transition: width 0.5s; }

        .panel-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 100; display: none; align-items: center; justify-content: center; }
        .panel-content { width: 90%; max-width: 800px; height: 80vh; overflow-y: auto; background: var(--bg); border: 1px solid var(--glass-border); border-radius: var(--radius); padding: 2rem; }

        .wheel-container { width: 300px; height: 300px; border-radius: 50%; border: 8px solid var(--glass-border); position: relative; overflow: hidden; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); }
        .wheel-pin { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 20px; height: 30px; background: var(--danger); clip-path: polygon(0 0, 100% 0, 50% 100%); z-index: 10; }

        #notif { position: fixed; top: 20px; right: 20px; padding: 1rem 2rem; border-radius: 1rem; z-index: 1000; transform: translateX(200%); transition: 0.5s; font-weight: 800; }
        .nt-ok { background: var(--primary); color: #000; }
        .nt-err { background: var(--danger); color: #fff; }

        .ticket-item { padding: 1rem; border-radius: 1rem; background: rgba(255,255,255,0.03); border: 1px solid transparent; margin-bottom: 0.75rem; cursor: pointer; }
        .ticket-item:hover { border-color: var(--primary); background: rgba(255,255,255,0.05); }
        .ticket-item.locked { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body data-theme="default">

    <div id="auth-screen" class="screen active">
        <div class="glass-card">
            <h1 style="color:var(--primary); font-size: 2.5rem;">TICKETSTONKS</h1>
            <p style="color:var(--muted); margin-bottom: 2rem;">V10 ULTIMATE ARCADE</p>
            <input type="text" id="username" placeholder="Nom d'utilisateur">
            <input type="password" id="password" placeholder="Mot de passe">
            <div style="display:flex; gap: 10px;">
                <button class="btn-primary" style="flex:1" onclick="Auth.handle('login')">Login</button>
                <button class="btn-secondary" style="flex:1" onclick="Auth.handle('register')">S'inscrire</button>
            </div>
        </div>
    </div>

    <div id="app-screen" class="screen">
        <div class="app-container">
            <div class="sidebar">
                <div style="text-align:center; margin-bottom: 2rem;">
                    <h2 id="hud-user">Joueur</h2>
                    <div class="level-bar"><div id="hud-xp-bar" class="level-progress"></div></div>
                    <small id="hud-level">Niveau 1</small>
                </div>
                <div style="display:flex; flex-direction:column; gap: 0.5rem;">
                    <button class="btn-secondary" onclick="UI.openPanel('shop')">🛍️ Boutique</button>
                    <button class="btn-secondary" onclick="UI.openPanel('roulette')">🎡 Roulette</button>
                    <button id="admin-btn" class="btn-secondary" style="display:none" onclick="UI.openPanel('admin')">🔑 Admin</button>
                    <button class="btn-secondary" onclick="Auth.logout()">🚪 Quitter</button>
                </div>
                <div style="margin: 2rem 0 1rem; font-size: 0.8rem;">
                    <div style="display:flex; justify-content:space-between"><span>Gains:</span><span id="stat-won" style="color:var(--gold)">0</span></div>
                    <div style="display:flex; justify-content:space-between"><span>Scratched:</span><span id="stat-scratched">0</span></div>
                </div>
            </div>

            <div class="main-game">
                <div class="sidebar" style="display:flex; justify-content:space-between; align-items:center; flex:0;">
                    <div class="stat-badge"><span style="color:var(--gold)">💰</span> <span id="hud-credits">0</span></div>
                    <h2 id="current-ticket-name">Choisissez un ticket</h2>
                    <div id="pct-display" style="font-weight:900;">0%</div>
                </div>
                <div class="scratch-stage">
                    <div id="under-grid" class="underlay"></div>
                    <canvas id="canvas"></canvas>
                </div>
                <div style="display:flex; gap: 1rem;">
                    <button id="buy-btn" class="btn-primary" style="flex:2" onclick="Game.buy()">Acheter</button>
                    <button id="scratch-all-btn" class="btn-secondary" style="flex:1" onclick="Game.scratchAll()" disabled>Tout Gratter</button>
                </div>
            </div>

            <div class="sidebar">
                <h3>Tickets (Niv 1-100)</h3>
                <div id="ticket-list" style="margin-top:1rem"></div>
            </div>
        </div>
    </div>

    <!-- Panels -->
    <div id="shop-panel" class="panel-overlay">
        <div class="panel-content">
            <div style="display:flex; justify-content:space-between"><h2>Boutique Skins</h2><button onclick="UI.closePanels()">X</button></div>
            <div id="theme-list" style="margin-top:2rem"></div>
            <div id="upgrade-list" style="margin-top:1rem"></div>
        </div>
    </div>

    <div id="roulette-panel" class="panel-overlay">
        <div class="panel-content" style="text-align:center">
            <h2>Roue 24h</h2>
            <div style="margin:2rem auto; width:300px; height:300px; position:relative">
                <div class="wheel-pin"></div>
                <div id="wheel" class="wheel-container"></div>
            </div>
            <button id="spin-btn" class="btn-primary" onclick="Game.spinWheel()">Tourner</button>
            <p id="roulette-timer"></p>
        </div>
    </div>

    <div id="admin-panel" class="panel-overlay">
        <div class="panel-content">
            <h2>Panel Admin</h2>
            <table style="width:100%; margin-top:2rem">
                <thead><tr><th>User</th><th>Pass</th><th>$$</th><th>XP</th><th>Action</th></tr></thead>
                <tbody id="admin-user-list"></tbody>
            </table>
        </div>
    </div>

    <div id="notif"></div>

    <script>
        const TICKETS = Array.from({length: 20}, (_, i) => ({
            id: 't'+i, name: 'Ticket Lvl '+(i*5+1), cost: Math.pow(1.5, i)*50, 
            reward: Math.pow(1.5, i)*120, levelReq: i*5, xp: 50*(i+1), icons: '🍒🍋🍇🍉🍓💎💰👑🔥⚡'.split('')[i%10]
        }));

        const THEMES = [
            {id:'default', name:'Glass Green', cost:0}, {id:'blue', name:'Cyber Blue', cost:5000},
            {id:'purple', name:'Neon Purple', cost:20000}, {id:'gold', name:'Gold Edition', cost:100000}
        ];

        let state = {
            db: JSON.parse(localStorage.getItem('ts_v10_db')) || { users: {} },
            user: null, activeTicket: TICKETS[0], isScratching: false, currentResult: null
        };

        const Database = { save: () => localStorage.setItem('ts_v10_db', JSON.stringify(state.db)) };

        const Auth = {
            handle: (type) => {
                const u = document.getElementById('username').value.trim();
                const p = document.getElementById('password').value.trim();
                if(!u || !p) return UI.notify("Champs requis", "err");
                if(type === 'register') {
                    if(state.db.users[u]) return UI.notify("Existe déjà", "err");
                    state.db.users[u] = { username:u, password:p, credits:500, xp:0, level:1, totalWon:0, scratched:0, lastRoulette:0, skins:['default'], currentTheme:'default', brushSize:30, isAdmin:u.toLowerCase()==='admin' };
                }
                const user = state.db.users[u];
                if(user && user.password === p) { state.user = user; UI.initApp(); }
                else UI.notify("Erreur auth", "err");
                Database.save();
            },
            logout: () => location.reload()
        };

        const UI = {
            notify: (msg, type) => {
                const n = document.getElementById('notif');
                n.innerText = msg; n.className = 'nt-'+type;
                n.style.transform = "translateX(0)";
                setTimeout(() => n.style.transform = "translateX(200%)", 3000);
            },
            initApp: () => {
                document.getElementById('auth-screen').classList.remove('active');
                document.getElementById('app-screen').classList.add('active');
                if(state.user.isAdmin) document.getElementById('admin-btn').style.display='block';
                document.body.setAttribute('data-theme', state.user.currentTheme);
                UI.updateHUD(); UI.renderTickets(); UI.renderShop(); UI.renderRoulette();
            },
            updateHUD: () => {
                if(!state.user) return;
                document.getElementById('hud-user').innerText = state.user.username.toUpperCase();
                document.getElementById('hud-credits').innerText = Math.floor(state.user.credits);
                document.getElementById('hud-level').innerText = "Niveau " + state.user.level;
                document.getElementById('stat-won').innerText = Math.floor(state.user.totalWon);
                document.getElementById('stat-scratched').innerText = state.user.scratched;
                document.getElementById('hud-xp-bar').style.width = (state.user.xp / (state.user.level*500) * 100) + "%";
            },
            renderTickets: () => {
                document.getElementById('ticket-list').innerHTML = TICKETS.map(t => `
                    <div class="ticket-item ${state.user.level<t.levelReq?'locked':''}" onclick="UI.selectTicket('${t.id}')">
                        <b>${t.name}</b> <small>${Math.floor(t.cost)} cr.</small>
                    </div>`).join('');
            },
            selectTicket: (id) => {
                const t = TICKETS.find(x=>x.id===id);
                if(state.user.level<t.levelReq) return UI.notify("Niveau "+t.levelReq+" requis", "err");
                state.activeTicket = t;
                document.getElementById('current-ticket-name').innerText = t.name;
                document.getElementById('buy-btn').innerText = "Acheter ("+Math.floor(t.cost)+")";
                Game.reset();
            },
            openPanel: (id) => { document.getElementById(id+'-panel').style.display='flex'; if(id==='admin') UI.renderAdmin(); },
            closePanels: () => document.querySelectorAll('.panel-overlay').forEach(p=>p.style.display='none'),
            renderShop: () => {
                document.getElementById('theme-list').innerHTML = THEMES.map(t => `
                    <div class="ticket-item"><b>${t.name}</b> 
                    <button onclick="Game.buyTheme('${t.id}')">${state.user.skins.includes(t.id)?'Équiper':t.cost+' cr.'}</button></div>`).join('');
            },
            renderAdmin: () => {
                document.getElementById('admin-user-list').innerHTML = Object.values(state.db.users).map(u => `
                    <tr><td>${u.username}</td><td>${u.password}</td>
                    <td><input type="number" value="${u.credits}" onchange="Admin.upd('${u.username}','credits',this.value)"></td>
                    <td><input type="number" value="${u.xp}" onchange="Admin.upd('${u.username}','xp',this.value)"></td></tr>`).join('');
            },
            renderRoulette: () => {
                const wheel = document.getElementById('wheel');
                const prizes = [100, 0, 1000, 0, 5000, 0, 20000, 0];
                wheel.innerHTML = prizes.map((p,i) => `
                    <div style="position:absolute; width:50%; height:50%; background:${i%2?'#000':'#5ac8a8'}; transform-origin:100% 100%; transform: rotate(${i*45}deg) skewY(45deg); display:flex; align-items:center; justify-content:center;">
                        <span style="transform: skewY(-45deg) rotate(-22deg) translate(20px,40px); font-weight:900">${p}</span></div>`).join('');
                document.getElementById('spin-btn').disabled = (Date.now()-state.user.lastRoulette < 86400000);
            }
        };

        const Game = {
            buy: () => {
                if(state.user.credits < state.activeTicket.cost) return UI.notify("Pas assez de crédits", "err");
                state.user.credits -= state.activeTicket.cost;
                document.getElementById('buy-btn').disabled = true;
                document.getElementById('scratch-all-btn').disabled = false;
                Game.generate(); Game.initCanvas(); UI.updateHUD(); Database.save();
            },
            generate: () => {
                const win = Math.random() < 0.5;
                const grid = Array.from({length:9}, () => '🍒🍋🍇🍉🍓💎💰👑🔥⚡'[Math.floor(Math.random()*10)]);
                if(win) { const icon = state.activeTicket.icons; grid[0]=grid[1]=grid[2]=icon; }
                grid.sort(()=>Math.random()-0.5);
                state.currentResult = {win};
                document.getElementById('under-grid').innerHTML = `<div style="display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; padding:2rem; width:100%; height:100%">
                    ${grid.map(i=>`<div style="font-size:2.5rem; background:rgba(0,0,0,0.05); display:flex; align-items:center; justify-content:center; aspect-ratio:1/1">${i}</div>`).join('')}</div>`;
            },
            initCanvas: () => {
                const c = document.getElementById('canvas'); const ctx = c.getContext('2d');
                const r = c.parentElement.getBoundingClientRect(); c.width=r.width; c.height=r.height;
                ctx.fillStyle='#b0b0b0'; ctx.fillRect(0,0,c.width,c.height);
                ctx.fillStyle='#444'; ctx.font='bold 30px Satoshi'; ctx.textAlign='center'; ctx.fillText('GRATTEZ ICI', c.width/2, c.height/2);
                const scratch = (e) => {
                    if(!state.isScratching) return;
                    const rect = c.getBoundingClientRect();
                    ctx.globalCompositeOperation='destination-out'; ctx.beginPath();
                    ctx.arc(e.clientX-rect.left, e.clientY-rect.top, state.user.brushSize, 0, 6.28); ctx.fill();
                    Game.check();
                };
                c.onmousedown=()=>{state.isScratching=true;}; window.onmousemove=scratch; window.onmouseup=()=>{state.isScratching=false;};
            },
            check: () => {
                const c = document.getElementById('canvas'); const d = ctx = c.getContext('2d').getImageData(0,0,c.width,c.height).data;
                let cl=0; for(let i=3; i<d.length; i+=4) if(d[i]===0) cl++;
                const pct = Math.floor(cl/(c.width*c.height)*100);
                document.getElementById('pct-display').innerText = pct+"%";
                if(pct>80) Game.finalize();
            },
            scratchAll: () => { document.getElementById('canvas').getContext('2d').clearRect(0,0,4000,4000); Game.finalize(); },
            finalize: () => {
                if(!state.currentResult) return;
                const win = state.currentResult.win; state.currentResult=null;
                if(win) { state.user.credits+=state.activeTicket.reward; state.user.totalWon+=state.activeTicket.reward; confetti(); UI.notify("GAGNÉ !","ok"); }
                else UI.notify("PERDU...","err");
                state.user.scratched++; state.user.xp+=state.activeTicket.xp;
                if(state.user.xp >= state.user.level*500) { state.user.xp=0; state.user.level++; UI.notify("LEVEL UP !","ok"); }
                Database.save(); UI.updateHUD(); setTimeout(()=>document.getElementById('buy-btn').disabled=false, 1000);
            },
            reset: () => { document.getElementById('under-grid').innerHTML=''; document.getElementById('canvas').getContext('2d').clearRect(0,0,4000,4000); document.getElementById('pct-display').innerText="0%"; },
            spinWheel: () => {
                const r = Math.floor(Math.random()*360)+1440;
                document.getElementById('wheel').style.transform = `rotate(${r}deg)`;
                setTimeout(() => {
                    const prizes = [100, 0, 1000, 0, 5000, 0, 20000, 0];
                    const win = prizes[Math.floor(((360-(r%360))%360)/45)];
                    state.user.credits+=win; state.user.lastRoulette=Date.now();
                    Database.save(); UI.updateHUD(); UI.renderRoulette(); UI.notify("Gain: "+win,"ok");
                }, 4000);
            },
            buyTheme: (id) => {
                const t = THEMES.find(x=>x.id===id);
                if(state.user.skins.includes(id)) { state.user.currentTheme=id; document.body.setAttribute('data-theme',id); }
                else if(state.user.credits>=t.cost) { state.user.credits-=t.cost; state.user.skins.push(id); state.user.currentTheme=id; document.body.setAttribute('data-theme',id); }
                Database.save(); UI.updateHUD(); UI.renderShop();
            }
        };

        const Admin = { upd: (u,f,v) => { state.db.users[u][f]=parseFloat(v); Database.save(); UI.notify("Mis à jour","ok"); } };
    </script>
</body>
</html>
