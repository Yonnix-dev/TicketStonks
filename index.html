<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicketStonks V12 - Ultimate Pro Arcade</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --blur: blur(20px);
            --primary: #5ac8a8;
            --secondary: #66a3ff;
            --gold: #f2c14e;
            --danger: #ff6b7a;
            --bg: #0b0c0e;
            --text: #ffffff;
            --muted: #9ca7b4;
            --radius: 1.5rem;
            --grad: linear-gradient(135deg, var(--primary), var(--secondary));
        }
        [data-theme="blue"] { --primary: #0084ff; --secondary: #00d2ff; }
        [data-theme="purple"] { --primary: #a855f7; --secondary: #ec4899; }
        [data-theme="gold"] { --primary: #fbbf24; --secondary: #f59e0b; }
        [data-theme="red"] { --primary: #ef4444; --secondary: #f87171; }
        
        * { box-sizing: border-box; user-select: none; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Satoshi', sans-serif; min-height: 100vh; overflow-x: hidden; }
        
        .glass { background: var(--glass); backdrop-filter: var(--blur); border: 1px solid var(--glass-border); border-radius: var(--radius); }
        .btn-grad { background: var(--grad); border: none; color: white; padding: 0.8rem 1.5rem; border-radius: 1rem; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        .btn-grad:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }

        #auth-screen { position: fixed; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at top right, #1a1c22, #0b0c0e); }
        .auth-card { padding: 3rem; text-align: center; width: 400px; }
        .input-group { margin-bottom: 1.5rem; text-align: left; }
        input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); padding: 1rem; color: white; border-radius: 1rem; outline: none; }
        input:focus { border-color: var(--primary); }

        #game-ui { display: none; max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .navbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .stats-bar { display: flex; gap: 1rem; }
        .stat-card { padding: 0.5rem 1.5rem; display: flex; align-items: center; gap: 0.8rem; }
        .money { color: var(--gold); font-weight: 900; }
        .xp-bar-outer { width: 200px; height: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; overflow: hidden; margin-top: 5px; }
        .xp-bar-inner { height: 100%; background: var(--grad); width: 0%; transition: width 0.5s; }

        .layout { display: grid; grid-template-columns: 350px 1fr; gap: 2rem; }
        
        .sidebar { display: flex; flex-direction: column; gap: 1rem; }
        .ticket-item { padding: 1.5rem; cursor: pointer; border: 2px solid transparent; opacity: 0.6; }
        .ticket-item.active { opacity: 1; border-color: var(--primary); background: rgba(255,255,255,0.08); }
        .ticket-item.locked { filter: grayscale(1); cursor: not-allowed; }
        .ticket-item h3 { margin: 0; font-size: 1.2rem; }
        .price-tag { color: var(--gold); font-weight: 700; }

        .play-zone { display: flex; flex-direction: column; align-items: center; gap: 2rem; padding: 2rem; position: relative; }
        #canvas-wrap { position: relative; width: 400px; height: 400px; background: #222; border-radius: 2rem; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        canvas { position: absolute; inset: 0; cursor: crosshair; }
        .content-layer { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 3rem; background: #fff; color: #000; }
        
        .extra-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 2rem; }
        .shop-card { padding: 1.5rem; }
        .wheel-wrap { position: relative; text-align: center; }
        #wheel { width: 250px; height: 250px; border: 10px solid var(--glass-border); border-radius: 50%; position: relative; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); }
        #wheel::after { content: '▼'; position: absolute; top: -20px; left: 50%; transform: translateX(-50%); color: var(--primary); font-size: 1.5rem; }
        .wheel-segment { position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; clip-path: polygon(50% 50%, 0 0, 100% 0); }

        #admin-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; padding: 2rem; }
        .admin-content { background: #1a1c22; width: 100%; max-width: 800px; border-radius: 1rem; padding: 2rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid #333; }
    </style>
</head>
<body onclick="if(event.ctrlKey && event.shiftKey && event.key === 'A') Admin.prompt()">

    <div id="auth-screen">
        <div class="glass auth-card">
            <h1 style="background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">TICKETSTONKS</h1>
            <p style="color: var(--muted); margin-bottom: 2rem;">V12 - Ultimate Pro Arcade</p>
            <div class="input-group">
                <label>Nom d'utilisateur</label>
                <input type="text" id="username" placeholder="Pseudo...">
            </div>
            <div class="input-group">
                <label>Mot de passe</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            <button class="btn-grad" style="width: 100%;" onclick="Auth.action()">DÉMARRER</button>
        </div>
    </div>

    <div id="game-ui">
        <nav class="navbar">
            <h2 id="user-display">Bonjour, User</h2>
            <div class="stats-bar">
                <div class="glass stat-card">
                    <span>🪙</span>
                    <span id="money-display" class="money">100</span>
                </div>
                <div class="glass stat-card">
                    <div>
                        <div style="display: flex; justify-content: space-between; font-size: 0.8rem;">
                            <span>Niv. <b id="lvl-display">1</b></span>
                            <span id="xp-text">0 / 100</span>
                        </div>
                        <div class="xp-bar-outer">
                            <div id="xp-bar" class="xp-bar-inner"></div>
                        </div>
                    </div>
                </div>
                <button class="glass" style="padding: 0 1rem; cursor: pointer; border: none; color: white;" onclick="Auth.logout()">🚪</button>
            </div>
        </nav>

        <div class="layout">
            <div class="sidebar" id="ticket-list"></div>
            <div class="glass play-zone">
                <div id="canvas-wrap">
                    <div id="content-bg" class="content-layer">
                        <div id="grid-symbols" style="display: grid; gap: 10px;"></div>
                    </div>
                    <canvas id="scratch-layer"></canvas>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <button class="btn-grad" id="buy-btn" onclick="Game.buy()">ACHETER TICKET</button>
                    <button class="glass" style="padding: 0 2rem; color: white; border-radius: 1rem; cursor: pointer;" onclick="Game.scratchAll()">TOUT GRATTER</button>
                </div>
                <div id="rule-box" style="text-align: center; color: var(--muted); font-size: 0.9rem;"></div>
            </div>
        </div>

        <div class="extra-tabs">
            <div class="glass shop-card">
                <h3>BOUTIQUE</h3>
                <button class="glass btn-grad" style="width: 100%; margin-top: 1rem;" onclick="Game.upgradeBrush()">
                    Pinceau plus large (+5px) <br> <span id="brush-cost">50</span> cr.
                </button>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;">
                    <button class="glass" style="color:white; padding: 10px;" onclick="Game.buyTheme('blue', 500)">Theme Bleu (500)</button>
                    <button class="glass" style="color:white; padding: 10px;" onclick="Game.buyTheme('purple', 1000)">Theme Purple (1k)</button>
                </div>
            </div>
            <div class="glass wheel-wrap">
                <h3>ROUE DE LA FORTUNE</h3>
                <div id="wheel">
                    <div class="wheel-segment" style="transform: rotate(0deg); background: #5ac8a8;">1k</div>
                    <div class="wheel-segment" style="transform: rotate(45deg); background: #66a3ff;">500</div>
                    <div class="wheel-segment" style="transform: rotate(90deg); background: #f2c14e;">5k</div>
                    <div class="wheel-segment" style="transform: rotate(135deg); background: #ff6b7a;">250</div>
                    <div class="wheel-segment" style="transform: rotate(180deg); background: #5ac8a8;">10k</div>
                    <div class="wheel-segment" style="transform: rotate(225deg); background: #66a3ff;">100</div>
                    <div class="wheel-segment" style="transform: rotate(270deg); background: #f2c14e;">2.5k</div>
                    <div class="wheel-segment" style="transform: rotate(315deg); background: #ff6b7a;">50</div>
                </div>
                <button class="btn-grad" id="spin-btn" style="margin-top: 2rem;" onclick="Game.spin()">TOURNER (Gratuit 24h)</button>
            </div>
        </div>
    </div>

    <div id="admin-modal">
        <div class="admin-content">
            <div style="display: flex; justify-content: space-between;">
                <h2>PANEL ADMIN</h2>
                <button onclick="document.getElementById('admin-modal').style.display='none'" style="color:white; font-size:2rem; background:none; border:none;">×</button>
            </div>
            <table>
                <thead><tr><th>User</th><th>Pass</th><th>Money</th><th>XP</th><th>Action</th></tr></thead>
                <tbody id="admin-table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        const db = {
            get users() { return JSON.parse(localStorage.getItem('ts_users') || '[]'); },
            set users(v) { localStorage.setItem('ts_users', JSON.stringify(v)); },
            get session() { return localStorage.getItem('ts_session'); },
            set session(v) { localStorage.setItem('ts_session', v || ''); }
        };

        let user = null, activeIdx = 0, isScratched = false, canvas, ctx;

        const tickets = [
            { name: "Ticket Simple", cost: 10, lvl: 1, grid: [1, 3], prize: 50, rule: "3 identiques = Gain" },
            { name: "Grille 3x3", cost: 25, lvl: 3, grid: [3, 3], prize: 150, rule: "3+ identiques = Gain" },
            { name: "Carte Trésor", cost: 50, lvl: 5, grid: [4, 4], prize: 500, rule: "Trouve les coffres" },
            { name: "Mega Combo", cost: 100, lvl: 8, grid: [5, 3], prize: 2000, rule: "Lignes gagnantes" }
        ];

        const symbols = ['💎', '🍋', '🍒', '🔔', '💰', '🍀', '7️⃣'];

        const Auth = {
            action() {
                const u = document.getElementById('username').value.trim();
                const p = document.getElementById('password').value;
                if(!u || !p) return;
                let list = db.users;
                let f = list.find(x => x.name === u);
                if(f) {
                    if(f.pass !== p) return alert("MDP incorrect");
                    this.start(f);
                } else {
                    f = { name: u, pass: p, money: 100, xp: 0, lvl: 1, brush: 20, themes: [], activeTheme: '' };
                    list.push(f); db.users = list; this.start(f);
                }
            },
            start(f) {
                user = f; db.session = f.name;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('game-ui').style.display = 'block';
                UI.update(); UI.renderTickets(); initCanvas();
            },
            logout() { db.session = ''; location.reload(); }
        };

        const UI = {
            update() {
                document.getElementById('money-display').innerText = user.money;
                document.getElementById('lvl-display').innerText = user.lvl;
                document.getElementById('xp-bar').style.width = (user.xp / (user.lvl * 100)) * 100 + '%';
                document.getElementById('brush-cost').innerText = user.brush * 5;
                document.body.setAttribute('data-theme', user.activeTheme);
            },
            renderTickets() {
                const l = document.getElementById('ticket-list'); l.innerHTML = '';
                tickets.forEach((t, i) => {
                    const lock = user.lvl < t.lvl;
                    const d = document.createElement('div');
                    d.className = `glass ticket-item ${i === activeIdx ? 'active' : ''} ${lock ? 'locked' : ''}`;
                    d.innerHTML = `<h3>${t.name}</h3><p>${t.cost} cr.</p>`;
                    if(!lock) d.onclick = () => { activeIdx = i; UI.renderTickets(); initCanvas(); };
                    l.appendChild(d);
                });
                document.getElementById('rule-box').innerText = tickets[activeIdx].rule;
            }
        };

        function initCanvas() {
            canvas = document.getElementById('scratch-layer'); ctx = canvas.getContext('2d');
            canvas.width = 400; canvas.height = 400;
            ctx.fillStyle = '#b5b5b5'; ctx.fillRect(0,0,400,400);
            const t = tickets[activeIdx];
            const g = document.getElementById('grid-symbols');
            g.style.gridTemplateColumns = `repeat(${t.grid[0]}, 1fr)`;
            g.innerHTML = '';
            for(let i=0; i < t.grid[0]*t.grid[1]; i++) {
                g.innerHTML += `<div style="padding:10px; background:#eee; border-radius:5px;">${symbols[Math.floor(Math.random()*symbols.length)]}</div>`;
            }
            isScratched = false;
            let draw = false;
            const scratch = (e) => {
                if(!draw || isScratched) return;
                const r = canvas.getBoundingClientRect();
                const x = (e.clientX || e.touches[0].clientX) - r.left;
                const y = (e.clientY || e.touches[0].clientY) - r.top;
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath(); ctx.arc(x, y, user.brush, 0, Math.PI*2); ctx.fill();
                check();
            };
            canvas.onmousedown = () => draw = true; canvas.onmouseup = () => draw = false; canvas.onmousemove = scratch;
        }

        function check() {
            const d = ctx.getImageData(0,0,400,400).data;
            let c = 0; for(let i=3; i<d.length; i+=4) if(d[i] === 0) c++;
            if(c > 400*400*0.5 && !isScratched) reveal();
        }

        function reveal() {
            isScratched = true; ctx.clearRect(0,0,400,400);
            const sList = Array.from(document.getElementById('grid-symbols').children).map(x => x.innerText);
            const cnt = {}; sList.forEach(s => cnt[s] = (cnt[s] || 0) + 1);
            let win = false; for(let s in cnt) if(cnt[s] >= 3) win = true;
            if(win) { user.money += tickets[activeIdx].prize; confetti(); alert("Gagné !"); }
            user.xp += 10; if(user.xp >= user.lvl*100) { user.xp=0; user.lvl++; alert("Level Up!"); }
            UI.update(); save();
        }

        function save() { let l = db.users; l[l.findIndex(x => x.name === user.name)] = user; db.users = l; }

        const Game = {
            buy() { if(user.money >= tickets[activeIdx].cost) { user.money -= tickets[activeIdx].cost; initCanvas(); UI.update(); save(); } },
            scratchAll() { if(!isScratched) reveal(); },
            upgradeBrush() { const c = user.brush*5; if(user.money >= c) { user.money -= c; user.brush += 5; UI.update(); save(); } },
            spin() {
                const w = document.getElementById('wheel'); const r = 1800 + Math.random()*1800;
                w.style.transform = `rotate(${r}deg)`;
                setTimeout(() => {
                    const prizes = [1000, 500, 5000, 250, 10000, 100, 2500, 50];
                    const p = prizes[Math.floor(((360 - (r % 360)) % 360) / 45)];
                    user.money += p; UI.update(); save(); alert(`Roue: +${p}`);
                }, 4000);
            },
            buyTheme(t, c) {
                if(user.themes.includes(t)) user.activeTheme = t;
                else if(user.money >= c) { user.money -= c; user.themes.push(t); user.activeTheme = t; }
                UI.update(); save();
            }
        };

        const Admin = {
            prompt() { if(prompt("Code?") === "admin123") { document.getElementById('admin-modal').style.display='flex'; this.render(); } },
            render() {
                const b = document.getElementById('admin-table-body'); b.innerHTML = '';
                db.users.forEach((u, i) => {
                    b.innerHTML += `<tr><td>${u.name}</td><td>${u.pass}</td><td><input type="number" value="${u.money}" onchange="Admin.mod(${i},'money',this.value)"></td><td><input type="number" value="${u.xp}" onchange="Admin.mod(${i},'xp',this.value)"></td><td><button onclick="Admin.del(${i})">DEL</button></td></tr>`;
                });
            },
            mod(i, k, v) { let l = db.users; l[i][k] = parseInt(v); db.users = l; if(user.name === l[i].name) user = l[i]; UI.update(); },
            del(i) { let l = db.users; l.splice(i, 1); db.users = l; this.render(); }
        };

        if(db.session) { const f = db.users.find(x => x.name === db.session); if(f) Auth.start(f); }
    </script>
</body>
</html>
