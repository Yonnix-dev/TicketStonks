<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicketStonks V12 - Ultimate Pro Arcade</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --blur: blur(20px);
            --primary: #5ac8a8;
            --secondary: #66a3ff;
            --gold: #f2c14e;
            --danger: #ff6b7a;
            --bg: #0b0c0e;
            --text: #ffffff;
            --radius: 1.5rem;
            --grad: linear-gradient(135deg, var(--primary), var(--secondary));
        }
        [data-theme="blue"] { --primary: #0084ff; --secondary: #00d2ff; }
        [data-theme="purple"] { --primary: #a855f7; --secondary: #ec4899; }
        [data-theme="gold"] { --primary: #fbbf24; --secondary: #f59e0b; }
        [data-theme="red"] { --primary: #ef4444; --secondary: #f87171; }
        
        * { box-sizing: border-box; user-select: none; transition: 0.3s; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; min-height: 100vh; overflow-x: hidden; }
        .glass { background: var(--glass); backdrop-filter: var(--blur); border: 1px solid var(--glass-border); border-radius: var(--radius); }
        .btn-grad { background: var(--grad); border: none; color: white; padding: 0.8rem 1.5rem; border-radius: 1rem; font-weight: 700; cursor: pointer; }
        .btn-grad:hover { transform: scale(1.05); }

        #auth-screen { position: fixed; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; background: #000; }
        .auth-card { padding: 3rem; text-align: center; width: 400px; }
        input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); padding: 1rem; color: white; border-radius: 1rem; margin-top: 10px; outline: none; }
        input:focus { border-color: var(--primary); }

        #game-ui { display: none; max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .navbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .stats { display: flex; gap: 1rem; }
        .xp-bar { width: 150px; height: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; overflow: hidden; margin-top: 5px; }
        .xp-inner { height: 100%; background: var(--grad); width: 0%; transition: 0.5s; }

        .layout { display: grid; grid-template-columns: 300px 1fr; gap: 2rem; }
        .ticket-item { padding: 1.5rem; cursor: pointer; border: 2px solid transparent; }
        .ticket-item.active { border-color: var(--primary); background: rgba(255,255,255,0.1); }
        .ticket-item.locked { opacity: 0.4; cursor: not-allowed; filter: grayscale(1); }

        .play-zone { display: flex; flex-direction: column; align-items: center; gap: 1.5rem; padding: 2rem; }
        #canvas-wrap { position: relative; width: 400px; height: 400px; background: #111; border-radius: 1.5rem; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        canvas { position: absolute; inset: 0; cursor: crosshair; z-index: 2; }
        .content-layer { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: #fff; color: #000; font-size: 2rem; z-index: 1; }
        
        #wheel { width: 250px; height: 250px; border: 5px solid var(--glass-border); border-radius: 50%; position: relative; transition: 4s cubic-bezier(0.15, 0, 0.15, 1); margin: 0 auto; }
        .wheel-seg { position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; clip-path: polygon(50% 50%, 0 0, 100% 0); font-weight: 900; font-size: 0.8rem; }
    </style>
</head>
<body onclick="if(event.ctrlKey && event.shiftKey && event.key === 'A') Admin.prompt()">

    <div id="auth-screen">
        <div class="glass auth-card">
            <h1 style="letter-spacing: 2px;">TICKETSTONKS</h1>
            <p style="color:#666; font-size:0.8rem;">V12 - Ultimate Pro Arcade</p>
            <input type="text" id="username" placeholder="Pseudo..." onkeydown="if(event.key==='Enter')Auth.action()">
            <input type="password" id="password" placeholder="Mot de passe..." onkeydown="if(event.key==='Enter')Auth.action()">
            <button class="btn-grad" style="width:100%; margin-top:20px;" onclick="Auth.action()">DÉMARRER</button>
        </div>
    </div>

    <div id="game-ui">
        <nav class="navbar">
            <h2 id="u-name" style="background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">User</h2>
            <div class="stats">
                <div class="glass" style="padding:0.5rem 1.5rem; display:flex; align-items:center; gap:10px;">
                    <span style="color:var(--gold);">🪙</span> <span id="u-money" style="font-weight:900;">0</span>
                </div>
                <div class="glass" style="padding:0.5rem 1.5rem;">
                    <div style="display:flex; justify-content:space-between; font-size:0.7rem;">
                        <span>Niveau <b id="u-lvl">1</b></span>
                        <span id="u-xp-text">0 / 100</span>
                    </div>
                    <div class="xp-bar"><div id="u-xp" class="xp-inner"></div></div>
                </div>
                <button class="glass" style="color:white; border:none; padding:10px; cursor:pointer;" onclick="Auth.logout()">🚪</button>
            </div>
        </nav>

        <div class="layout">
            <div id="t-list" style="display:flex; flex-direction:column; gap:10px;"></div>
            <div class="glass play-zone">
                <div id="canvas-wrap">
                    <div class="content-layer"><div id="g-sym" style="display:grid; gap:10px; padding:20px; width:100%; height:100%;"></div></div>
                    <canvas id="c-lay"></canvas>
                </div>
                <div style="display:flex; gap:15px;">
                    <button class="btn-grad" style="padding:1rem 2.5rem;" onclick="Game.buy()">ACHETER TICKET</button>
                    <button class="glass" style="color:white; padding:10px 20px; cursor:pointer;" onclick="Game.scratchAll()">TOUT GRATTER</button>
                </div>
                <p id="r-box" style="color:#777; font-size:0.9rem; font-style:italic;"></p>
            </div>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:2rem; margin-top:2rem;">
            <div class="glass" style="padding:1.5rem;">
                <h3 style="margin-top:0;">🛒 BOUTIQUE</h3>
                <button class="btn-grad" style="width:100%;" onclick="Game.upBrush()">AMÉLIORER PINCEAU (+5px) | <span id="b-cost">50</span> cr.</button>
                <div style="margin-top:15px; display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <button class="glass" style="color:white; padding:12px; cursor:pointer;" onclick="Game.setTheme('blue', 500)">Thème Bleu (500)</button>
                    <button class="glass" style="color:white; padding:12px; cursor:pointer;" onclick="Game.setTheme('purple', 1000)">Thème Purple (1k)</button>
                    <button class="glass" style="color:white; padding:12px; cursor:pointer;" onclick="Game.setTheme('gold', 2000)">Thème Gold (2k)</button>
                    <button class="glass" style="color:white; padding:12px; cursor:pointer;" onclick="Game.setTheme('red', 3000)">Thème Red (3k)</button>
                </div>
            </div>
            <div class="glass" style="padding:1.5rem; text-align:center;">
                <h3 style="margin-top:0;">🎡 ROUE DE LA FORTUNE</h3>
                <div id="wheel">
                    <div class="wheel-seg" style="transform:rotate(0deg); background:#5ac8a8;">1000</div>
                    <div class="wheel-seg" style="transform:rotate(45deg); background:#66a3ff;">500</div>
                    <div class="wheel-seg" style="transform:rotate(90deg); background:#f2c14e;">5000</div>
                    <div class="wheel-seg" style="transform:rotate(135deg); background:#ff6b7a;">250</div>
                    <div class="wheel-seg" style="transform:rotate(180deg); background:#5ac8a8;">10000</div>
                    <div class="wheel-seg" style="transform:rotate(225deg); background:#66a3ff;">100</div>
                    <div class="wheel-seg" style="transform:rotate(270deg); background:#f2c14e;">2500</div>
                    <div class="wheel-seg" style="transform:rotate(315deg); background:#ff6b7a;">50</div>
                </div>
                <button class="btn-grad" id="s-btn" style="margin-top:1.5rem;" onclick="Game.spin()">TOURNER (Gratuit 24h)</button>
            </div>
        </div>
    </div>

    <script>
        const db = {
            get u() { return JSON.parse(localStorage.getItem('ts_u') || '[]'); },
            set u(v) { localStorage.setItem('ts_u', JSON.stringify(v)); },
            get s() { return localStorage.getItem('ts_s'); },
            set s(v) { localStorage.setItem('ts_s', v || ''); }
        };

        let user=null, active=0, scratched=false, canvas, ctx;
        const tickets = [
            { n: "Ticket Départ", c: 10, l: 1, g: [1,3], p: 50, r: "3 symboles identiques = Gain" },
            { n: "Grille 3x3", c: 25, l: 3, g: [3,3], p: 150, r: "Au moins 3 symboles identiques = Gain" },
            { n: "Carte au Trésor", c: 50, l: 5, g: [4,4], p: 500, r: "Trouve les trésors (3+ identiques)" },
            { n: "Ticket Mega", c: 100, l: 8, g: [5,3], p: 2000, r: "Jackpot ! (3+ identiques)" }
        ];
        const symbols = ['💎', '🍋', '🍒', '🔔', '💰', '🍀', '7️⃣'];

        const Auth = {
            action() {
                const u = document.getElementById('username').value.trim();
                const p = document.getElementById('password').value;
                if(!u || !p) return;
                let list = db.u, f = list.find(x => x.name === u);
                if(f) { if(f.pass !== p) return alert("Mot de passe incorrect"); this.start(f); }
                else { f = { name: u, pass: p, money: 100, xp: 0, lvl: 1, brush: 20, themes: [], active: '' }; list.push(f); db.u = list; this.start(f); }
            },
            start(f) { 
                user = f; db.s = f.name; 
                document.getElementById('auth-screen').style.display = 'none'; 
                document.getElementById('game-ui').style.display = 'block'; 
                document.getElementById('u-name').innerText = f.name; 
                UI.up(); UI.tickets(); init(); 
            },
            logout() { db.s = ''; location.reload(); }
        };

        const UI = {
            up() {
                document.getElementById('u-money').innerText = user.money.toLocaleString();
                document.getElementById('u-lvl').innerText = user.lvl;
                const req = user.lvl * 100;
                document.getElementById('u-xp-text').innerText = `${user.xp} / ${req}`;
                document.getElementById('u-xp').style.width = (user.xp / req) * 100 + '%';
                document.getElementById('b-cost').innerText = user.brush * 5;
                document.body.setAttribute('data-theme', user.active);
            },
            tickets() {
                const l = document.getElementById('t-list'); l.innerHTML = '';
                tickets.forEach((t, i) => {
                    const lock = user.lvl < t.l;
                    const d = document.createElement('div');
                    d.className = `glass ticket-item ${i === active ? 'active' : ''} ${lock ? 'locked' : ''}`;
                    d.innerHTML = `<h3>${t.n} ${lock?'🔒':''}</h3><p>${t.c} cr.</p>`;
                    if(!lock) d.onclick = () => { active = i; UI.tickets(); init(); };
                    l.appendChild(d);
                });
                document.getElementById('r-box').innerText = tickets[active].r;
            }
        };

        function init() {
            canvas = document.getElementById('c-lay'); ctx = canvas.getContext('2d');
            canvas.width = 400; canvas.height = 400;
            ctx.fillStyle = '#b5b5b5'; ctx.fillRect(0,0,400,400);
            const t = tickets[active], g = document.getElementById('g-sym');
            g.style.gridTemplateColumns = `repeat(${t.g[0]}, 1fr)`; g.innerHTML = '';
            for(let i=0; i < t.g[0]*t.g[1]; i++) g.innerHTML += `<div style="background:#eee; border-radius:8px; display:flex; align-items:center; justify-content:center;">${symbols[Math.floor(Math.random()*symbols.length)]}</div>`;
            scratched = false; let draw = false;
            const scratch = (e) => {
                if(!draw || scratched) return;
                const r = canvas.getBoundingClientRect();
                const x = (e.clientX || e.touches[0].clientX) - r.left, y = (e.clientY || e.touches[0].clientY) - r.top;
                ctx.globalCompositeOperation = 'destination-out'; ctx.beginPath(); ctx.arc(x, y, user.brush, 0, Math.PI*2); ctx.fill();
                const d = ctx.getImageData(0,0,400,400).data; let c = 0; for(let i=3; i<d.length; i+=4) if(d[i] === 0) c++;
                if(c > 400*400*0.5 && !scratched) reveal();
            };
            canvas.onmousedown = () => draw = true; canvas.onmouseup = () => draw = false; canvas.onmousemove = scratch;
            canvas.ontouchstart = () => draw = true; canvas.ontouchend = () => draw = false; canvas.ontouchmove = scratch;
        }

        function reveal() {
            scratched = true; ctx.clearRect(0,0,400,400);
            const sList = Array.from(document.getElementById('g-sym').children).map(x => x.innerText);
            const cnt = {}; sList.forEach(s => cnt[s] = (cnt[s] || 0) + 1);
            let max = 0; for(let s in cnt) if(cnt[s] > max) max = cnt[s];
            if(max >= 3) { user.money += tickets[active].p; confetti(); alert("GAGNÉ ! +" + tickets[active].p + " cr."); }
            else { alert("PERDU..."); }
            user.xp += 20; if(user.xp >= user.lvl*100) { user.xp=0; user.lvl++; alert("LEVEL UP !"); }
            UI.up(); save();
        }

        function save() { let l = db.u; l[l.findIndex(x => x.name === user.name)] = user; db.u = l; }

        const Game = {
            buy() { if(user.money >= tickets[active].c) { user.money -= tickets[active].c; init(); UI.up(); save(); } else alert("Crédits insuffisants"); },
            scratchAll() { if(!scratched) reveal(); },
            upBrush() { const c = user.brush*5; if(user.money >= c) { user.money -= c; user.brush += 5; UI.up(); save(); } },
            spin() {
                const w = document.getElementById('wheel'); const r = 1800 + Math.random()*1800;
                w.style.transform = `rotate(${r}deg)`;
                setTimeout(() => {
                    const prizes = [1000, 500, 5000, 250, 10000, 100, 2500, 50];
                    const p = prizes[Math.floor(((360 - (r % 360)) % 360) / 45)];
                    user.money += p; UI.up(); save(); alert("ROUE: +" + p + " cr.");
                }, 4000);
            },
            setTheme(t, c) {
                if(user.themes.includes(t)) user.active = t;
                else if(user.money >= c) { user.money -= c; user.themes.push(t); user.active = t; }
                UI.up(); save();
            }
        };

        const Admin = {
            prompt() { if(prompt("Code?") === "admin123") { user.money += 10000; UI.up(); alert("Admin: +10k cr."); } }
        };

        if(db.s) { const f = db.u.find(x => x.name === db.s); if(f) Auth.start(f); }
    </script>
</body>
</html>
