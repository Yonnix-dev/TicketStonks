<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicketStonks V11 - Ultimate Pro Arcade</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@900,700,500,400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --blur: blur(20px);
            --primary: #5ac8a8;
            --secondary: #66a3ff;
            --gold: #f2c14e;
            --danger: #ff6b7a;
            --bg: #0b0c0e;
            --text: #ffffff;
            --muted: #9ca7b4;
            --radius: 1.5rem;
            --grad: linear-gradient(135deg, var(--primary), var(--secondary));
        }

        [data-theme="blue"] { --primary: #0084ff; --secondary: #00d2ff; }
        [data-theme="purple"] { --primary: #a855f7; --secondary: #ec4899; }
        [data-theme="gold"] { --primary: #fbbf24; --secondary: #f59e0b; }
        [data-theme="red"] { --primary: #ef4444; --secondary: #f87171; }

        * {
            box-sizing: border-box;
            user-select: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Satoshi', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .screen {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10;
            opacity: 0;
            transform: scale(0.95);
        }

        .screen.active {
            display: flex;
            opacity: 1;
            transform: scale(1);
        }

        .glass {
            background: var(--glass);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
        }

        .btn-grad {
            background: var(--grad);
            border: none;
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-grad:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }

        /* Login/Signup */
        .auth-card {
            width: 400px;
            padding: 3rem;
            text-align: center;
        }

        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--muted);
            font-size: 0.9rem;
        }

        .input-group input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 1rem;
            border-radius: 0.8rem;
            color: white;
            outline: none;
        }

        /* Main Game Layout */
        #game-screen {
            display: none;
            grid-template-columns: 300px 1fr 300px;
            gap: 1.5rem;
            padding: 1.5rem;
            width: 100%;
            height: 100%;
        }

        .sidebar, .ticket-list {
            height: 100%;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            padding: 1.5rem;
            overflow-y: auto;
        }

        /* Canvas Area */
        .main-stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .canvas-container {
            flex: 1;
            position: relative;
            background: #fffbe6;
            border-radius: 2rem;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.1);
        }

        canvas {
            cursor: crosshair;
            touch-action: none;
        }

        #scratch-result {
            position: absolute;
            font-size: 4rem;
            font-weight: 900;
            color: #2d3436;
            text-align: center;
            pointer-events: none;
            z-index: 1;
        }

        /* Ticket Cards */
        .ticket-item {
            padding: 1.5rem;
            margin-bottom: 0.5rem;
            cursor: pointer;
            opacity: 0.6;
        }

        .ticket-item.active {
            opacity: 1;
            border-color: var(--primary);
            background: rgba(90, 200, 168, 0.1);
        }

        .ticket-item.locked {
            filter: grayscale(1);
            cursor: not-allowed;
            background: rgba(255, 255, 255, 0.02);
        }

        /* Roulette */
        .wheel-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 2rem auto;
        }

        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid var(--glass-border);
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
            background: conic-gradient(
                #ff6b6b 0 45deg, #4ecdc4 45deg 90deg, 
                #45b7d1 90deg 135deg, #96ceb4 135deg 180deg,
                #ffeead 180deg 225deg, #ffcc5c 225deg 270deg,
                #ff6f69 270deg 315deg, #ff8b94 315deg 360deg
            );
        }

        .wheel-pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 40px;
            background: var(--primary);
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 5;
        }

        /* Admin Panel */
        #admin-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            height: 80%;
            z-index: 100;
            padding: 2rem;
            display: none;
            flex-direction: column;
        }

        .admin-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        .admin-table th, .admin-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--glass-border);
        }

        /* Modal Base */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 50;
            display: none;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <!-- Auth Screen -->
    <div id="auth-screen" class="screen active">
        <div class="auth-card glass">
            <h1 style="margin-top:0">TicketStonks</h1>
            <p style="color:var(--muted)">Connectez-vous pour jouer</p>
            <div class="input-group">
                <label>Nom d'utilisateur</label>
                <input type="text" id="username" placeholder="Pseudo...">
            </div>
            <div class="input-group">
                <label>Mot de passe</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            <div style="display:flex; gap:1rem; margin-top:1rem;">
                <button class="btn-grad" style="flex:1" onclick="auth.login()">Connexion</button>
                <button class="btn-grad" style="flex:1; --primary:#444; --secondary:#222;" onclick="auth.signup()">S'inscrire</button>
            </div>
        </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen">
        <div class="sidebar glass">
            <div style="text-align:center; padding:1rem;">
                <h2 id="display-user">USER</h2>
                <div style="background:rgba(255,255,255,0.05); height:8px; border-radius:4px; overflow:hidden;">
                    <div id="xp-bar" style="width:0%; height:100%; background:var(--grad);"></div>
                </div>
                <p style="font-size:0.8rem; color:var(--muted); margin-top:0.5rem;">Niveau <span id="display-lvl">1</span></p>
            </div>
            
            <button class="btn-grad" onclick="ui.toggleModal('boutique')">🛍️ BOUTIQUE</button>
            <button class="btn-grad" onclick="ui.toggleModal('roulette')">🎡 ROULETTE</button>
            <button class="btn-grad" style="--primary:#ff6b7a; --secondary:#ee5253" onclick="auth.logout()">🚪 QUITTER</button>
            <button class="btn-grad" style="--primary:#444; --secondary:#333; margin-top:auto" onclick="admin.checkAccess()">⚙️ ADMIN</button>
        </div>

        <div class="main-stage">
            <div class="glass" style="display:flex; justify-content:space-between; padding:1.2rem 2rem; align-items:center;">
                <div style="display:flex; align-items:center; gap:0.8rem;">
                    <span style="font-size:1.5rem;">💰</span>
                    <span id="display-money" style="font-size:1.5rem; font-weight:900;">100</span>
                </div>
                <h3 id="display-ticket-name" style="margin:0">Ticket Départ</h3>
                <div id="scratch-percent" style="color:var(--muted)">0%</div>
            </div>

            <div class="canvas-container">
                <div id="scratch-result">?</div>
                <canvas id="canvas"></canvas>
            </div>

            <div style="display:flex; gap:1rem;">
                <button id="buy-btn" class="btn-grad" style="flex:2; height:80px; font-size:1.5rem;" onclick="game.buyTicket()">ACHETER</button>
                <button class="btn-grad" style="flex:1; --primary:#444; --secondary:#222;" onclick="game.scratchAll()">TOUT GRATTER</button>
            </div>
        </div>

        <div class="ticket-list glass">
            <h4 style="margin-top:0">Tickets (Niv 1-100)</h4>
            <div id="tickets-container"></div>
        </div>
    </div>

    <!-- Modals -->
    <div id="modal-boutique" class="modal">
        <div class="glass" style="width:600px; padding:2.5rem; position:relative;">
            <button onclick="ui.closeModals()" style="position:absolute; top:1rem; right:1rem; background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">&times;</button>
            <h2>Boutique de Skins</h2>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                <div class="glass" style="padding:1rem;">
                    <h4>Thèmes</h4>
                    <button class="btn-grad" style="width:100%; margin-bottom:0.5rem;" onclick="game.setTheme('default')">Emeraude (Base)</button>
                    <button class="btn-grad" style="width:100%; margin-bottom:0.5rem; --primary:#0084ff; --secondary:#00d2ff;" onclick="game.setTheme('blue')">Ocean (5000 cr.)</button>
                    <button class="btn-grad" style="width:100%; margin-bottom:0.5rem; --primary:#a855f7; --secondary:#ec4899;" onclick="game.setTheme('purple')">Neon (10000 cr.)</button>
                    <button class="btn-grad" style="width:100%; margin-bottom:0.5rem; --primary:#fbbf24; --secondary:#f59e0b;" onclick="game.setTheme('gold')">Royal (25000 cr.)</button>
                </div>
                <div class="glass" style="padding:1rem;">
                    <h4>Améliorations</h4>
                    <button class="btn-grad" style="width:100%;" onclick="game.upgradeBrush()">Trait plus large (<span id="brush-cost">1000</span> cr.)</button>
                    <p style="font-size:0.8rem; color:var(--muted); margin-top:0.5rem;">Taille actuelle: <span id="brush-size">20</span></p>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-roulette" class="modal">
        <div class="glass" style="width:400px; padding:2.5rem; text-align:center; position:relative;">
            <button onclick="ui.closeModals()" style="position:absolute; top:1rem; right:1rem; background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">&times;</button>
            <h2>Roulette Quotidienne</h2>
            <div class="wheel-container">
                <div class="wheel-pointer"></div>
                <div id="wheel"></div>
            </div>
            <p id="roulette-timer" style="color:var(--muted); margin-bottom:1rem;"></p>
            <button id="spin-btn" class="btn-grad" style="width:100%" onclick="game.spinWheel()">LANCER</button>
        </div>
    </div>

    <div id="admin-panel" class="glass">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>Panel Admin</h2>
            <button class="btn-grad" style="--primary:#ff6b7a" onclick="admin.close()">Fermer</button>
        </div>
        <div style="flex:1; overflow-y:auto; margin-top:1rem;">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>User</th>
                        <th>Mots de passe</th>
                        <th>Crédits</th>
                        <th>XP</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="admin-users-list"></tbody>
            </table>
        </div>
    </div>

    <script>
        // Data Structure
        const DB_KEY = 'ts_v11_db';
        let db = JSON.parse(localStorage.getItem(DB_KEY)) || {
            users: [],
            session: null
        };

        function saveDB() {
            localStorage.setItem(DB_KEY, JSON.stringify(db));
        }

        // State
        let currentUser = null;
        let activeTicket = 0;
        let isScratched = false;
        let brushSize = 25;
        let scratchThreshold = 85;

        const ticketsData = Array.from({length: 20}, (_, i) => ({
            id: i,
            name: `Ticket Niv.${i * 5 + 1}`,
            cost: Math.floor(10 * Math.pow(2.2, i)),
            minLvl: i * 5,
            winProb: 0.5
        }));

        // Canvas Logic
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;

        function initCanvas() {
            canvas.width = 500;
            canvas.height = 500;
            ctx.fillStyle = '#bdc3c7';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.globalCompositeOperation = 'destination-out';
            isScratched = false;
            document.getElementById('scratch-result').style.opacity = '0';
            document.getElementById('scratch-percent').innerText = '0%';
        }

        canvas.addEventListener('mousedown', () => isDrawing = true);
        canvas.addEventListener('mousemove', scratch);
        window.addEventListener('mouseup', () => isDrawing = false);

        function scratch(e) {
            if (!isDrawing || isScratched) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            ctx.beginPath();
            ctx.arc(x, y, currentUser.brush || 25, 0, Math.PI * 2);
            ctx.fill();
            checkScratchProgress();
        }

        function checkScratchProgress() {
            const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            let cleared = 0;
            for (let i = 3; i < pixels.length; i += 4) {
                if (pixels[i] === 0) cleared++;
            }
            const percent = Math.round((cleared / (canvas.width * canvas.height)) * 100);
            document.getElementById('scratch-percent').innerText = percent + '%';

            if (percent > scratchThreshold && !isScratched) {
                revealResult();
            }
        }

        function revealResult() {
            isScratched = true;
            const win = Math.random() < 0.5;
            const resEl = document.getElementById('scratch-result');
            const ticket = ticketsData[activeTicket];
            
            if (win) {
                const prize = ticket.cost * 3;
                resEl.innerText = prize + ' cr.';
                resEl.style.color = '#27ae60';
                currentUser.money += prize;
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            } else {
                resEl.innerText = 'PERDU';
                resEl.style.color = '#e74c3c';
            }
            
            resEl.style.opacity = '1';
            currentUser.xp += 10;
            checkLevel();
            ui.update();
            saveDB();
        }

        function checkLevel() {
            const nextLvlXp = currentUser.level * 100;
            if (currentUser.xp >= nextLvlXp) {
                currentUser.xp -= nextLvlXp;
                currentUser.level++;
                alert(`BRAVO ! Vous êtes maintenant niveau ${currentUser.level}`);
            }
        }

        // Auth Logic
        const auth = {
            login() {
                const user = db.users.find(u => u.name === document.getElementById('username').value && u.pass === document.getElementById('password').value);
                if (user) {
                    db.session = user.name;
                    this.startSession(user);
                } else {
                    alert('Identifiants incorrects');
                }
            },
            signup() {
                const name = document.getElementById('username').value;
                const pass = document.getElementById('password').value;
                if (!name || !pass) return alert('Remplis tout !');
                if (db.users.find(u => u.name === name)) return alert('Pseudo déjà pris');
                
                const newUser = {
                    name, pass,
                    money: 1000,
                    xp: 0,
                    level: 1,
                    brush: 25,
                    theme: 'default',
                    lastSpin: 0,
                    ownedThemes: ['default']
                };
                db.users.push(newUser);
                db.session = name;
                saveDB();
                this.startSession(newUser);
            },
            startSession(user) {
                currentUser = user;
                document.getElementById('auth-screen').classList.remove('active');
                document.getElementById('game-screen').style.display = 'grid';
                ui.initTickets();
                ui.update();
                initCanvas();
                document.body.setAttribute('data-theme', user.theme || 'default');
            },
            logout() {
                db.session = null;
                saveDB();
                location.reload();
            }
        };

        // UI Logic
        const ui = {
            update() {
                if (!currentUser) return;
                document.getElementById('display-user').innerText = currentUser.name;
                document.getElementById('display-money').innerText = Math.floor(currentUser.money);
                document.getElementById('display-lvl').innerText = currentUser.level;
                
                const xpNeeded = currentUser.level * 100;
                const xpPerc = (currentUser.xp / xpNeeded) * 100;
                document.getElementById('xp-bar').style.width = xpPerc + '%';
                
                document.getElementById('display-ticket-name').innerText = ticketsData[activeTicket].name;
                document.getElementById('brush-size').innerText = currentUser.brush || 25;
                document.getElementById('brush-cost').innerText = (currentUser.brush || 25) * 100;

                this.initTickets();
                this.checkSpin();
            },
            initTickets() {
                const container = document.getElementById('tickets-container');
                container.innerHTML = '';
                ticketsData.forEach((t, i) => {
                    const isLocked = currentUser.level < t.minLvl;
                    const div = document.createElement('div');
                    div.className = `ticket-item glass ${i === activeTicket ? 'active' : ''} ${isLocked ? 'locked' : ''}`;
                    div.innerHTML = `
                        <div style="font-weight:900">${t.name}</div>
                        <div style="font-size:0.8rem; color:var(--muted)">${isLocked ? '🔒 Niveau '+t.minLvl : t.cost + ' cr.'}</div>
                    `;
                    if (!isLocked) div.onclick = () => { activeTicket = i; ui.update(); initCanvas(); };
                    container.appendChild(div);
                });
            },
            toggleModal(id) {
                document.getElementById('modal-'+id).style.display = 'flex';
            },
            closeModals() {
                document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
            },
            checkSpin() {
                const now = Date.now();
                const last = currentUser.lastSpin || 0;
                const diff = now - last;
                const day = 24 * 60 * 60 * 1000;
                
                const btn = document.getElementById('spin-btn');
                if (diff < day) {
                    btn.disabled = true;
                    btn.style.opacity = '0.5';
                    const remain = day - diff;
                    const h = Math.floor(remain / 3600000);
                    const m = Math.floor((remain % 3600000) / 60000);
                    document.getElementById('roulette-timer').innerText = `Reviens dans ${h}h ${m}m`;
                } else {
                    btn.disabled = false;
                    btn.style.opacity = '1';
                    document.getElementById('roulette-timer').innerText = 'Disponible !';
                }
            }
        };

        // Game Actions
        const game = {
            buyTicket() {
                const ticket = ticketsData[activeTicket];
                if (currentUser.money >= ticket.cost) {
                    currentUser.money -= ticket.cost;
                    initCanvas();
                    ui.update();
                    saveDB();
                } else {
                    alert('Pas assez de crédits !');
                }
            },
            scratchAll() {
                if (isScratched) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                revealResult();
            },
            setTheme(t) {
                const costs = { blue: 5000, purple: 10000, gold: 25000, default: 0 };
                if (currentUser.ownedThemes.includes(t)) {
                    currentUser.theme = t;
                    document.body.setAttribute('data-theme', t);
                } else {
                    if (currentUser.money >= costs[t]) {
                        currentUser.money -= costs[t];
                        currentUser.ownedThemes.push(t);
                        currentUser.theme = t;
                        document.body.setAttribute('data-theme', t);
                    } else {
                        alert('Pas assez d\'argent !');
                    }
                }
                saveDB();
                ui.update();
            },
            upgradeBrush() {
                const cost = (currentUser.brush || 25) * 100;
                if (currentUser.money >= cost) {
                    currentUser.money -= cost;
                    currentUser.brush = (currentUser.brush || 25) + 5;
                    saveDB();
                    ui.update();
                } else {
                    alert('Pas assez d\'argent !');
                }
            },
            spinWheel() {
                const btn = document.getElementById('spin-btn');
                btn.disabled = true;
                const wheel = document.getElementById('wheel');
                const deg = Math.floor(3600 + Math.random() * 360);
                wheel.style.transform = `rotate(${deg}deg)`;
                
                setTimeout(() => {
                    const actualDeg = deg % 360;
                    // Rewards mapping based on sections
                    let prize = 0;
                    if (actualDeg >= 0 && actualDeg < 45) prize = 1000;
                    else if (actualDeg >= 45 && actualDeg < 90) prize = 500;
                    else if (actualDeg >= 90 && actualDeg < 135) prize = 5000;
                    else if (actualDeg >= 135 && actualDeg < 180) prize = 100;
                    else if (actualDeg >= 180 && actualDeg < 225) prize = 2500;
                    else if (actualDeg >= 225 && actualDeg < 270) prize = 10000;
                    else if (actualDeg >= 270 && actualDeg < 315) prize = 200;
                    else prize = 50;

                    alert(`Gagné: ${prize} crédits !`);
                    currentUser.money += prize;
                    currentUser.lastSpin = Date.now();
                    saveDB();
                    ui.update();
                }, 5000);
            }
        };

        // Admin Logic
        const admin = {
            checkAccess() {
                const code = prompt('Code secret admin ?');
                if (code === 'admin123') {
                    this.open();
                }
            },
            open() {
                document.getElementById('admin-panel').style.display = 'flex';
                const list = document.getElementById('admin-users-list');
                list.innerHTML = '';
                db.users.forEach((u, i) => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${u.name}</td>
                        <td>${u.pass}</td>
                        <td><input type="number" value="${u.money}" onchange="admin.update(${i}, 'money', this.value)"></td>
                        <td><input type="number" value="${u.xp}" onchange="admin.update(${i}, 'xp', this.value)"></td>
                        <td><button onclick="admin.delete(${i})" style="color:red">Suppr</button></td>
                    `;
                    list.appendChild(tr);
                });
            },
            update(idx, key, val) {
                db.users[idx][key] = parseFloat(val);
                saveDB();
                if (currentUser && db.users[idx].name === currentUser.name) currentUser = db.users[idx];
                ui.update();
            },
            delete(idx) {
                if (confirm('Supprimer cet utilisateur ?')) {
                    db.users.splice(idx, 1);
                    saveDB();
                    this.open();
                }
            },
            close() {
                document.getElementById('admin-panel').style.display = 'none';
            }
        };

        // Init
        if (db.session) {
            const user = db.users.find(u => u.name === db.session);
            if (user) auth.startSession(user);
        }
    </script>
</body>
</html>
