<!DOCTYPE html><html lang="fr" data-theme="dark"><head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>TicketStonks V8 - Pro Arcade</title> <link rel="preconnect" href="https://fonts.googleapis.com"> <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet"> <style> :root { --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem); --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem); --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem); --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem); --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem); --space-1: 0.25rem; --space-2: 0.5rem; --space-4: 1rem; --space-8: 2rem; --radius-xl: 1.5rem; --color-bg: #0b0c0e; --color-surface: #17191c; --color-primary: #5ac8a8; --color-blue: #66a3ff; --color-gold: #f2c14e; --color-danger: #ff6b7a; --color-text: #f2f5f7; --color-muted: #9ca7b4; } * { box-sizing: border-box; user-select: none; } body { font-family: 'Satoshi', sans-serif; background: var(--color-bg); color: var(--color-text); margin: 0; overflow-x: hidden; } #app { display: none; padding: 2rem; } .active { display: block !important; } .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; background: var(--color-surface); padding: 1rem 2rem; border-radius: var(--radius-xl); border: 1px solid rgba(255,255,255,0.1); } .stats-container { display: flex; gap: 2rem; } .stat { display: flex; flex-direction: column; } .stat-label { font-size: 0.7rem; color: var(--color-muted); text-transform: uppercase; } .stat-value { font-size: 1.5rem; font-weight: 900; color: var(--color-primary); } .main-layout { display: grid; grid-template-columns: 300px 1fr 300px; gap: 2rem; } .panel { background: var(--color-surface); padding: 1.5rem; border-radius: var(--radius-xl); border: 1px solid rgba(255,255,255,0.1); } .ticket-card { padding: 1rem; margin-bottom: 1rem; background: rgba(255,255,255,0.03); border-radius: 1rem; cursor: pointer; border: 1px solid transparent; transition: 0.3s; } .ticket-card:hover { border-color: var(--color-primary); } .ticket-card.locked { opacity: 0.4; cursor: not-allowed; } .scratch-area { background: #f6edd0; border-radius: 2rem; height: 400px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; } #canvas { cursor: crosshair; } .btn { padding: 0.8rem 1.5rem; border-radius: 0.8rem; border: none; font-weight: 800; cursor: pointer; transition: 0.2s; } .btn-primary { background: var(--color-primary); color: #000; } .daily-btn { background: var(--color-gold); color: #000; margin-top: 1rem; width: 100%; } .leaderboard-item { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid rgba(255,255,255,0.05); } </style></head><body> <div id="loading" style="position:fixed; inset:0; background:#000; display:flex; align-items:center; justify-content:center; z-index:100;"> <h1 style="color:var(--color-primary)">CHARGEMENT...</h1> </div> <div id="auth" class="active" style="height:100vh; display:flex; align-items:center; justify-content:center"> <div class="panel" style="width:400px; text-align:center"> <h1>TicketStonks V8</h1> <input type="text" id="user-in" placeholder="Pseudo" style="width:100%; padding:1rem; margin-bottom:1rem; background:#000; border:1px solid #333; color:#fff"> <button class="btn btn-primary" onclick="login()">ENTRER</button> </div> </div> <div id="app"> <header class="topbar"> <div class="stats-container"> <div class="stat"><span class="stat-label">Crédits</span><span id="credits" class="stat-value">0</span></div> <div class="stat"><span class="stat-label">Niveau</span><span id="level" class="stat-value">1</span></div> </div> <div><span id="username-display" style="font-weight:900">Joueur</span></div> <button class="btn" style="background:#333; color:#fff" onclick="logout()">LOGOUT</button> </header> <main class="main-layout"> <aside class="panel"> <h3>Boutique</h3> <div id="ticket-list"></div> <button id="daily-btn" class="btn daily-btn" onclick="claimDaily()">RÉCOMPENSE QUOTIDIENNE</button> </aside> <section class="panel" style="text-align:center"> <h2 id="ticket-name">Sélectionne un ticket</h2> <div class="scratch-area"> <canvas id="canvas"></canvas> </div> <div style="margin-top:1rem"> <button id="buy-btn" class="btn btn-primary" onclick="buyTicket()">ACHETER</button> <p id="pct">0%</p> </div> </section> <aside class="panel"> <h3>Classement</h3> <div id="leaderboard"></div> <div style="margin-top:2rem"> <h3>Stats</h3> <p id="total-won">Gains totaux: 0</p> <p id="tickets-scratched">Tickets grattés: 0</p> </div> </aside> </main> </div> <script> let db = JSON.parse(localStorage.getItem('ts_v8')) || { users: {} }; let currentUser = null; const TICKETS = [ { id: 'basic', name: 'Le Petit', cost: 10, reward: 50, unlock: 1 }, { id: 'pro', name: 'Pro Gamer', cost: 100, reward: 600, unlock: 5 } ]; function login() { const name = document.getElementById('user-in').value; if(!name) return; if(!db.users[name]) { db.users[name] = { name, credits: 100, level: 1, lastDaily: 0, totalWon: 0, scratched: 0 }; } currentUser = db.users[name]; save(); document.getElementById('auth').classList.remove('active'); document.getElementById('app').classList.add('active'); updateUI(); } function logout() { location.reload(); } function save() { localStorage.setItem('ts_v8', JSON.stringify(db)); } function updateUI() { document.getElementById('credits').innerText = currentUser.credits; document.getElementById('level').innerText = currentUser.level; document.getElementById('username-display').innerText = currentUser.name; document.getElementById('total-won').innerText = "Gains totaux: " + currentUser.totalWon; document.getElementById('tickets-scratched').innerText = "Tickets grattés: " + currentUser.scratched; renderTickets(); renderLeaderboard(); } function renderTickets() { const list = document.getElementById('ticket-list'); list.innerHTML = ''; TICKETS.forEach(t => { const locked = currentUser.level < t.unlock; list.innerHTML += `<div class="ticket-card ${locked ? 'locked' : ''}" onclick="selectTicket('${t.id}')"> <b>${t.name}</b><br>Coût: ${t.cost} cr. ${locked ? '(Niv ' + t.unlock + ')' : ''} </div>`; }); } function renderLeaderboard() { const lb = document.getElementById('leaderboard'); const sorted = Object.values(db.users).sort((a,b) => b.credits - a.credits).slice(0,5); lb.innerHTML = sorted.map((u, i) => `<div class="leaderboard-item"><span>${i+1}. ${u.name}</span><span>${u.credits}</span></div>`).join(''); } function claimDaily() { const now = Date.now(); if(now - currentUser.lastDaily < 86400000) return alert("Reviens plus tard !"); currentUser.credits += 50; currentUser.lastDaily = now; save(); updateUI(); alert("50 crédits offerts !"); } window.onload = () => { setTimeout(() => document.getElementById('loading').style.display='none', 1000); }; </script></body></html>
