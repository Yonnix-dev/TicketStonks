<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicketStonks V8 - Ultimate Pro Arcade</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">
    <style>
        :root {
            --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
            --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
            --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
            --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
            --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
            --space-1: 0.25rem;
            --space-2: 0.5rem;
            --space-4: 1rem;
            --space-8: 2rem;
            --radius-xl: 1.5rem;
            --color-bg: #0b0c0e;
            --color-surface: #17191c;
            --color-primary: #5ac8a8;
            --color-blue: #66a3ff;
            --color-gold: #f2c14e;
            --color-danger: #ff6b7a;
            --color-text: #f2f5f7;
            --color-muted: #9ca7b4;
            --shadow-lg: 0 22px 60px rgba(0,0,0,0.34);
        }
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Satoshi', sans-serif; background: var(--color-bg); color: var(--color-text); margin: 0; overflow-x: hidden; }
        #auth-screen, #app-screen, #admin-panel, #loading { position: fixed; inset: 0; display: none; flex-direction: column; z-index: 10; }
        .active-screen { display: flex !important; }
        #loading { background: var(--color-bg); align-items: center; justify-content: center; z-index: 1000; }
        .spinner { width: 48px; height: 48px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--color-primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #auth-screen { background: radial-gradient(circle at center, #1e2126 0%, #0b0c0e 100%); align-items: center; justify-content: center; }
        .auth-card { background: var(--color-surface); padding: 2.5rem; border-radius: var(--radius-xl); border: 1px solid rgba(255,255,255,0.1); width: 400px; text-align: center; box-shadow: var(--shadow-lg); }
        .auth-card input { width: 100%; padding: 1rem; margin-bottom: 1rem; border-radius: 0.8rem; background: #000; border: 1px solid rgba(255,255,255,0.1); color: #fff; font-family: inherit; }
        .btn-auth { width: 100%; padding: 1rem; border-radius: 0.8rem; background: var(--color-primary); color: #000; border: none; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .app-container { max-width: 1400px; margin: 0 auto; padding: 1.5rem; display: grid; gap: 1.5rem; }
        .topbar { display: flex; justify-content: space-between; align-items: center; background: var(--color-surface); padding: 1rem 2rem; border-radius: var(--radius-xl); border: 1px solid rgba(255,255,255,0.1); }
        .main-layout { display: grid; grid-template-columns: 320px 1fr 320px; gap: 1.5rem; }
        .panel { background: var(--color-surface); padding: 1.5rem; border-radius: var(--radius-xl); border: 1px solid rgba(255,255,255,0.1); }
        .ticket-card { padding: 1.25rem; margin-bottom: 0.75rem; background: rgba(255,255,255,0.03); border-radius: 1rem; cursor: pointer; border: 1px solid transparent; transition: 0.2s; position: relative; }
        .ticket-card:hover:not(.locked) { border-color: var(--color-primary); background: rgba(90,200,168,0.05); }
        .ticket-card.locked { opacity: 0.5; filter: grayscale(1); cursor: not-allowed; }
        .scratch-stage { background: #f6edd0; border-radius: 2rem; height: 450px; position: relative; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #canvas { cursor: crosshair; z-index: 5; }
        .underlay { position: absolute; inset: 0; display: grid; place-items: center; z-index: 1; }
        .leaderboard-item { display: flex; justify-content: space-between; padding: 0.75rem 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .v8-badge { background: var(--color-primary); color: #000; font-size: 0.7rem; font-weight: 900; padding: 2px 8px; border-radius: 4px; display: inline-block; margin-bottom: 1rem; }
        #admin-panel { background: #000; color: #0f0; font-family: 'Courier New', monospace; padding: 2rem; z-index: 1000; overflow-y: auto; }
        .admin-table { width: 100%; border-collapse: collapse; margin-top: 1.5rem; }
        .admin-table th, .admin-table td { border: 1px solid #0f0; padding: 12px; text-align: left; }
        #notif { position: fixed; top: 100px; right: 20px; padding: 1rem 2rem; border-radius: 1rem; z-index: 2000; transform: translateX(200%); transition: 0.5s; font-weight: 800; }
        #notif.show { transform: translateX(0); }
        .nt-ok { background: var(--color-primary); color: #000; }
        .nt-err { background: var(--color-danger); color: #fff; }
    </style>
</head>
<body>
    <div id="loading" class="active-screen"><div class="spinner"></div></div>
    
    <div id="auth-screen">
        <div class="auth-card">
            <div class="v8-badge">V8 PRO EDITION</div>
            <h1>TicketStonks</h1>
            <input type="text" id="username" placeholder="Pseudo">
            <input type="password" id="password" placeholder="Mot de passe">
            <button class="btn-auth" onclick="handleAuth()">ACCÉDER À L'ARCADE</button>
            <p style="color: var(--color-muted); font-size: 0.8rem; margin-top: 1.5rem;">Sauvegarde cloud locale cryptée.</p>
        </div>
    </div>

    <div id="app-screen">
        <div class="app-container">
            <header class="topbar">
                <div style="display:flex; gap: 2rem">
                    <div><span style="font-size: 0.7rem; color: var(--color-muted)">CRÉDITS</span><br><span id="hud-credits" style="font-size: 1.5rem; font-weight: 900; color: var(--color-primary)">0</span></div>
                    <div><span style="font-size: 0.7rem; color: var(--color-muted)">NIVEAU</span><br><span id="hud-level" style="font-size: 1.5rem; font-weight: 900; color: var(--color-primary)">1</span></div>
                </div>
                <div style="text-align: center">
                    <span id="hud-username" style="font-weight: 900; font-size: 1.2rem">Joueur</span>
                    <div style="width: 200px; height: 6px; background: #333; border-radius: 3px; margin-top: 5px; overflow: hidden">
                        <div id="xp-fill" style="height: 100%; width: 0%; background: var(--color-primary); transition: 0.3s"></div>
                    </div>
                </div>
                <button class="btn-auth" style="width: auto; padding: 0.6rem 1.2rem; background: #333; color: #fff" onclick="logout()">LOGOUT</button>
            </header>

            <main class="main-layout">
                <aside class="panel">
                    <h3>Boutique de tickets</h3>
                    <div id="ticket-list"></div>
                    <button id="daily-btn" class="btn-auth" style="margin-top: 1rem; background: var(--color-gold)" onclick="claimDaily()">DAILY REWARD (+50)</button>
                </aside>

                <section class="panel" style="text-align: center">
                    <h2 id="play-title">Sélectionne un ticket</h2>
                    <div class="scratch-stage">
                        <div class="underlay" id="underlay"></div>
                        <canvas id="canvas"></canvas>
                    </div>
                    <div style="margin-top: 1.5rem; display: flex; gap: 1rem; justify-content: center">
                        <button id="buy-btn" class="btn-auth" onclick="buyTicket()" style="width: 250px">ACHETER</button>
                        <button id="new-btn" class="btn-auth" onclick="resetGame()" style="width: 250px; background: #333; color: #fff" disabled>CONTINUER</button>
                    </div>
                    <p id="pct" style="margin-top: 1rem; font-weight: 900; color: var(--color-primary)">GRATTÉ : 0%</p>
                </section>

                <aside class="panel">
                    <h3>Classement Top 5</h3>
                    <div id="leaderboard"></div>
                    <h3 style="margin-top: 2rem">Statistiques</h3>
                    <div class="leaderboard-item"><span>Total gagné:</span> <span id="stat-won" style="color: var(--color-primary)">0</span></div>
                    <div class="leaderboard-item"><span>Tickets grattés:</span> <span id="stat-scratched" style="color: var(--color-primary)">0</span></div>
                    <button class="btn-auth" style="margin-top: 2rem; background: transparent; border: 1px solid #333; color: var(--color-muted); font-size: 0.7rem" onclick="openAdmin()">ADMIN</button>
                </aside>
            </main>
        </div>
    </div>

    <div id="admin-panel">
        <h1>SECURITY TERMINAL V8.0</h1>
        <button class="btn-auth" style="width: auto" onclick="closeAdmin()">EXIT</button>
        <table class="admin-table">
            <thead>
                <tr><th>Pseudo</th><th>Password</th><th>Credits</th><th>Level</th><th>XP</th></tr>
            </thead>
            <tbody id="admin-tbody"></tbody>
        </table>
    </div>

    <div id="notif"></div>

    <script>
        const TICKETS = [
            { id: 'starter', name: 'Le Classique', cost: 10, reward: 50, unlock: 1, xp: 15, icons: ['🍎','🍊','🍋','🍒','💎'] },
            { id: 'pro', name: 'Pro Gamer', cost: 50, reward: 300, unlock: 3, xp: 40, icons: ['🔥','💧','⚡','❄️','🍀'] },
            { id: 'stonks', name: 'Golden Stonks', cost: 200, reward: 1500, unlock: 7, xp: 100, icons: ['💰','💳','🪙','💵','💸'] },
            { id: 'diamond', name: 'Diamant Éternel', cost: 1000, reward: 10000, unlock: 10, xp: 500, icons: ['💎','💍','👑','💰','✨'] }
        ];

        let db = JSON.parse(localStorage.getItem('ts_v8_db')) || { users: {} };
        let user = null;
        let activeTicketId = 'starter';
        let isScratching = false;
        let currentResult = null;

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('loading').classList.remove('active-screen');
                document.getElementById('auth-screen').classList.add('active-screen');
            }, 1000);
        };

        function save() {
            localStorage.setItem('ts_v8_db', JSON.stringify(db));
        }

        function handleAuth() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            if(!u || !p) return notify("Champs requis !", "err");

            if(db.users[u]) {
                if(db.users[u].password === p) login(u);
                else notify("Mot de passe incorrect", "err");
            } else {
                db.users[u] = {
                    username: u, password: p, credits: 100, level: 1, xp: 0, 
                    totalWon: 0, scratched: 0, lastDaily: 0
                };
                save();
                login(u);
                notify("Compte créé ! 100 cr. offerts", "ok");
            }
        }

        function login(u) {
            user = db.users[u];
            document.getElementById('auth-screen').classList.remove('active-screen');
            document.getElementById('app-screen').classList.add('active-screen');
            updateUI();
        }

        function logout() { location.reload(); }

        function updateUI() {
            if(!user) return;
            document.getElementById('hud-credits').innerText = Math.floor(user.credits);
            document.getElementById('hud-level').innerText = user.level;
            document.getElementById('hud-username').innerText = user.username;
            document.getElementById('stat-won').innerText = user.totalWon;
            document.getElementById('stat-scratched').innerText = user.scratched;

            const nextLevelXp = user.level * 100;
            const pct = (user.xp / nextLevelXp) * 100;
            document.getElementById('xp-fill').style.width = pct + '%';

            renderTickets();
            renderLeaderboard();
        }

        function renderTickets() {
            const list = document.getElementById('ticket-list');
            list.innerHTML = '';
            TICKETS.forEach(t => {
                const locked = user.level < t.unlock;
                const card = document.createElement('div');
                card.className = `ticket-card ${locked ? 'locked' : ''} ${activeTicketId === t.id ? 'active' : ''}`;
                card.innerHTML = `<b>${t.name}</b><br><span style="font-size: 0.8rem; color: var(--color-muted)">Coût: ${t.cost} cr.</span>`;
                
                if(!locked) {
                    card.onclick = () => {
                        activeTicketId = t.id;
                        document.getElementById('play-title').innerText = t.name;
                        document.getElementById('buy-btn').innerText = `ACHETER (${t.cost} cr.)`;
                        resetGame();
                        updateUI();
                    };
                } else {
                    card.innerHTML += `<div style="font-size: 0.6rem; color: var(--color-danger); font-weight: 900">NIV ${t.unlock} REQUIS</div>`;
                }
                list.appendChild(card);
            });
        }

        function renderLeaderboard() {
            const lb = document.getElementById('leaderboard');
            const sorted = Object.values(db.users).sort((a,b) => b.credits - a.credits).slice(0,5);
            lb.innerHTML = sorted.map((u, i) => `
                <div class="leaderboard-item">
                    <span>${i+1}. ${u.username}</span>
                    <span>${Math.floor(u.credits)}</span>
                </div>
            `).join('');
        }

        function claimDaily() {
            const now = Date.now();
            if(now - user.lastDaily < 86400000) return notify("Reviens dans 24h !", "err");
            user.credits += 50;
            user.lastDaily = now;
            save();
            updateUI();
            notify("+50 crédits quotidiens !", "ok");
        }

        function buyTicket() {
            const t = TICKETS.find(x => x.id === activeTicketId);
            if(user.credits < t.cost) return notify("Crédits insuffisants", "err");
            user.credits -= t.cost;
            document.getElementById('buy-btn').disabled = true;
            generateResult(t);
            initCanvas();
            updateUI();
            save();
        }

        function generateResult(t) {
            const grid = [];
            const win = Math.random() < 0.30;
            let winnerIcon = null;

            if(win) {
                winnerIcon = t.icons[Math.floor(Math.random() * t.icons.length)];
                for(let i=0; i<3; i++) grid.push(winnerIcon);
                while(grid.length < 9) {
                    let icon = t.icons[Math.floor(Math.random() * t.icons.length)];
                    if(grid.filter(x => x === icon).length < 2) grid.push(icon);
                }
            } else {
                while(grid.length < 9) {
                    let icon = t.icons[Math.floor(Math.random() * t.icons.length)];
                    if(grid.filter(x => x === icon).length < 2) grid.push(icon);
                }
            }
            grid.sort(() => Math.random() - 0.5);

            currentResult = { win, reward: t.reward, res: grid, t };
            
            document.getElementById('underlay').innerHTML = `
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; padding: 2rem; width: 100%; height: 100%;">
                    ${grid.map(icon => `<div style="font-size: 2.2rem; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); aspect-ratio: 1/1;">${icon}</div>`).join('')}
                </div>
            `;
        }

        function initCanvas() {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 400;
            canvas.height = 300;
            
            ctx.fillStyle = '#b0b0b0';
            ctx.fillRect(0,0, canvas.width, canvas.height);
            
            ctx.strokeStyle = '#888';
            ctx.lineWidth = 2;
            for(let i=0; i<10; i++) {
                ctx.beginPath();
                ctx.moveTo(Math.random()*canvas.width, 0);
                ctx.lineTo(Math.random()*canvas.width, canvas.height);
                ctx.stroke();
            }

            ctx.fillStyle = '#444';
            ctx.font = 'bold 24px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('GRATTEZ ICI', 200, 150);

            const scratch = (e) => {
                if(!isScratching) return;
                const rect = canvas.getBoundingClientRect();
                const x = ((e.clientX || e.touches[0].clientX) - rect.left) * (canvas.width / rect.width);
                const y = ((e.clientY || e.touches[0].clientY) - rect.top) * (canvas.height / rect.height);
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath();
                ctx.arc(x, y, 25, 0, Math.PI*2);
                ctx.fill();
                checkPercent();
            };

            canvas.onmousedown = canvas.ontouchstart = (e) => { isScratching = true; scratch(e); };
            window.onmousemove = window.ontouchmove = scratch;
            window.onmouseup = window.ontouchend = () => isScratching = false;
        }

        function checkPercent() {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            const data = ctx.getImageData(0,0, canvas.width, canvas.height).data;
            let count = 0;
            for(let i=3; i<data.length; i+=4) if(data[i] === 0) count++;
            const pct = Math.floor((count / (canvas.width * canvas.height)) * 100);
            document.getElementById('pct').innerText = `GRATTÉ : ${pct}%`;
            if(pct > 70) finalize();
        }

        function finalize() {
            if(!currentResult) return;
            const canvas = document.getElementById('canvas');
            canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);

            if(currentResult.win) {
                user.credits += currentResult.reward;
                user.totalWon += currentResult.reward;
                notify(`GAGNÉ : ${currentResult.reward} CR. !`, "ok");
            } else {
                notify("PERDU...", "err");
            }

            user.scratched++;
            user.xp += currentResult.t.xp;

            const nextLevelXp = user.level * 100;
            if(user.xp >= nextLevelXp) {
                user.xp -= nextLevelXp;
                user.level++;
                notify(`NIVEAU SUPÉRIEUR : ${user.level} !`, "ok");
            }

            currentResult = null;
            document.getElementById('new-btn').disabled = false;
            save();
            updateUI();
        }

        function resetGame() {
            document.getElementById('buy-btn').disabled = false;
            document.getElementById('new-btn').disabled = true;
            document.getElementById('pct').innerText = "GRATTÉ : 0%";
            document.getElementById('underlay').innerHTML = '';
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0,0,canvas.width,canvas.height);
            document.getElementById('play-title').innerText = "Sélectionne un ticket";
        }

        function openAdmin() {
            const p = prompt("Admin Pass:");
            if(p === "135975") {
                document.getElementById('admin-panel').classList.add('active-screen');
                const tbody = document.getElementById('admin-tbody');
                tbody.innerHTML = '';
                Object.values(db.users).forEach(u => {
                    tbody.innerHTML += `<tr><td>${u.username}</td><td>${u.password}</td><td>${u.credits}</td><td>${u.level}</td><td>${u.xp}</td></tr>`;
                });
            }
        }

        function closeAdmin() {
            document.getElementById('admin-panel').classList.remove('active-screen');
        }

        function notify(msg, type) {
            const n = document.getElementById('notif');
            n.innerText = msg;
            n.className = `nt-${type} show`;
            setTimeout(() => n.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
