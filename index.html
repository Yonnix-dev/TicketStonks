<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicketStonks V7 - Ultimate Arcade</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">
    <style>
        :root {
            --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
            --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
            --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
            --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
            --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
            --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem;
            --space-6: 1.5rem; --space-8: 2rem; --space-10: 2.5rem;
            --radius-sm: 0.5rem; --radius-md: 0.8rem; --radius-lg: 1.15rem; --radius-xl: 1.5rem; --radius-full: 9999px;
            --transition-interactive: 180ms cubic-bezier(0.16, 1, 0.3, 1);
            --font-body: 'Satoshi', 'Inter', sans-serif;
            --color-bg: #0b0c0e; --color-surface: #17191c; --color-surface-2: #1e2126; --color-surface-3: #252931;
            --color-border: rgba(255,255,255,0.09); --color-text: #f2f5f7; --color-muted: #9ca7b4;
            --color-primary: #5ac8a8; --color-primary-soft: rgba(90,200,168,0.16);
            --color-blue: #66a3ff; --color-gold: #f2c14e; --color-danger: #ff6b7a;
            --shadow-lg: 0 22px 60px rgba(0,0,0,0.34);
        }

        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; min-height: 100vh; background: var(--color-bg); color: var(--color-text); overflow-x: hidden; }
        body { font-family: var(--font-body); font-size: var(--text-base); line-height: 1.5; background: radial-gradient(circle at top, rgba(102,163,255,0.09), transparent 30%), radial-gradient(circle at bottom right, rgba(90,200,168,0.08), transparent 26%), var(--color-bg); }

        /* Screens Management */
        #auth-screen, #app-screen, #admin-panel, #loading { 
            position: fixed; inset: 0; display: none; flex-direction: column; z-index: 10;
        }
        .active-screen { display: flex !important; }

        /* Loading */
        #loading { background: var(--color-bg); align-items: center; justify-content: center; z-index: 1000; }
        .spinner { width: 48px; height: 48px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--color-primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Auth Screen */
        #auth-screen { background: radial-gradient(circle at center, #1e2126 0%, #0b0c0e 100%); align-items: center; justify-content: center; }
        .auth-card { background: var(--color-surface); padding: var(--space-10); border-radius: var(--radius-xl); border: 1px solid var(--color-border); width: 400px; text-align: center; box-shadow: var(--shadow-lg); }
        .auth-card h1 { margin-bottom: var(--space-6); font-weight: 900; letter-spacing: -1px; }
        .auth-card input { width: 100%; padding: 1rem; margin-bottom: 1rem; border-radius: var(--radius-md); background: #000; border: 1px solid var(--color-border); color: #fff; font-family: inherit; }
        .btn-auth { width: 100%; padding: 1rem; border-radius: var(--radius-md); background: var(--color-primary); color: #000; border: none; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .btn-auth:hover { transform: scale(1.02); opacity: 0.9; }

        /* Main App Layout */
        .app-container { max-width: 1200px; margin: 0 auto; padding: var(--space-6); display: grid; gap: var(--space-6); }
        .topbar, .panel, .ticket-card, .ticket-shell, .result-box {
            background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015));
            border: 1px solid var(--color-border); border-radius: var(--radius-xl); backdrop-filter: blur(12px);
        }
        
        .topbar { padding: var(--space-5); display: flex; align-items: center; justify-content: space-between; }
        .stat-group { display: flex; gap: var(--space-4); }
        .stat-pill { background: var(--color-surface-2); padding: 0.75rem 1.25rem; border-radius: var(--radius-lg); border: 1px solid var(--color-border); min-width: 120px; }
        .stat-label { font-size: 0.7rem; color: var(--color-muted); text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-weight: 900; font-size: 1.25rem; color: var(--color-primary); display: block; }

        .xp-hud { flex: 1; max-width: 400px; margin: 0 var(--space-6); }
        .xp-bar { height: 10px; background: var(--color-surface-3); border-radius: var(--radius-full); overflow: hidden; margin-top: 5px; position: relative; }
        .xp-fill { height: 100%; background: linear-gradient(90deg, var(--color-primary), var(--color-blue)); width: 0%; transition: width 0.4s; }

        .layout-main { display: grid; grid-template-columns: 350px 1fr; gap: var(--space-6); }
        .ticket-list { display: grid; gap: var(--space-3); height: calc(100vh - 250px); overflow-y: auto; padding-right: 5px; }
        .ticket-card { padding: 1.25rem; cursor: pointer; transition: 0.2s; position: relative; }
        .ticket-card:hover:not(.locked) { border-color: var(--color-primary); transform: translateX(5px); }
        .ticket-card.active { outline: 2px solid var(--color-primary); background: rgba(90,200,168,0.08); }
        .ticket-card.locked { opacity: 0.5; filter: grayscale(1); }
        .locked-badge { position: absolute; top: 10px; right: 10px; font-size: 0.7rem; background: var(--color-danger); padding: 2px 8px; border-radius: var(--radius-sm); font-weight: 800; }

        /* Scratch Area */
        .ticket-stage { 
            position: relative; background: linear-gradient(180deg, #f6edd0, #e6dab4); color: #20190b; 
            border-radius: 26px; height: 450px; overflow: hidden; border: 4px solid rgba(255,255,255,0.2);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .scratch-board { position: relative; width: 500px; aspect-ratio: 1.6; border-radius: 22px; overflow: hidden; background: rgba(255,255,255,0.6); }
        .underlay, .scratch-canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
        .scratch-canvas { z-index: 3; cursor: crosshair; }
        
        /* Underlay Games UI */
        .result-grid { height: 100%; display: grid; gap: 0.85rem; padding: 1.5rem; }
        .grid-3 { grid-template-columns: repeat(3, 1fr); align-items: center; }
        .grid-9 { grid-template-columns: repeat(3, 1fr); }
        .cell { background: #fff; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 900; box-shadow: inset 0 -4px 10px rgba(0,0,0,0.1); border: 1px solid rgba(0,0,0,0.05); }
        .cell.small { font-size: 1.5rem; }

        .game-controls { margin-top: 2rem; display: flex; gap: 1rem; justify-content: center; }
        .btn-game { padding: 1rem 2rem; border-radius: var(--radius-md); font-weight: 800; border: none; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--color-primary); color: #000; }
        .btn-secondary { background: var(--color-surface-2); color: var(--color-text); border: 1px solid var(--color-border); }

        /* Upgrades & HUD Side */
        .shop-panel { margin-top: var(--space-6); display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: var(--space-4); }
        .shop-card { padding: 1rem; background: var(--color-surface-2); border-radius: var(--radius-lg); border: 1px solid var(--color-border); }
        .shop-card h4 { margin: 0 0 0.5rem 0; font-size: 0.9rem; }
        .shop-btn { width: 100%; padding: 0.5rem; background: var(--color-primary-soft); color: var(--color-primary); border: 1px solid var(--color-primary); border-radius: var(--radius-sm); cursor: pointer; font-weight: 700; margin-top: 0.5rem; }

        /* Admin Terminal */
        #admin-panel { background: #000; color: #0f0; font-family: 'Courier New', monospace; padding: 2rem; overflow-y: auto; z-index: 1000; }
        .admin-table { width: 100%; border-collapse: collapse; margin-top: 2rem; }
        .admin-table th, .admin-table td { border: 1px solid #0f0; padding: 10px; text-align: left; }
        
        /* Loan UI */
        .loan-banner { background: var(--color-danger); color: white; padding: 0.5rem 1rem; border-radius: var(--radius-md); display: none; font-weight: 800; align-items: center; justify-content: space-between; margin-top: 1rem; }

        #notif { position: fixed; top: 100px; right: 20px; padding: 1rem 2rem; border-radius: var(--radius-md); z-index: 2000; transform: translateX(200%); transition: 0.5s; font-weight: 800; }
        #notif.show { transform: translateX(0); }
        .nt-ok { background: var(--color-primary); color: #000; }
        .nt-err { background: var(--color-danger); color: #fff; }
    </style>
</head>
<body>

    <div id="loading" class="active-screen"><div class="spinner"></div></div>

    <!-- Auth -->
    <div id="auth-screen">
        <div class="auth-card">
            <h1>TicketStonks Arcade</h1>
            <input type="text" id="username" placeholder="Pseudo">
            <input type="password" id="password" placeholder="Mot de passe">
            <button class="btn-auth" onclick="handleAuth()">COMMENCER L'AVENTURE</button>
            <p style="color: var(--color-muted); font-size: 0.8rem; margin-top: 1.5rem;">Sauvegarde cloud locale cryptée.</p>
        </div>
    </div>

    <!-- Main App -->
    <div id="app-screen">
        <div class="app-container">
            <header class="topbar">
                <div class="stat-group">
                    <div class="stat-pill">
                        <span class="stat-label">Crédits</span>
                        <span class="stat-value" id="hud-credits">0</span>
                    </div>
                    <div class="stat-pill">
                        <span class="stat-label">Niveau</span>
                        <span class="stat-value" id="hud-level">1</span>
                    </div>
                </div>

                <div class="xp-hud">
                    <div style="display: flex; justify-content: space-between; font-size: 0.75rem;">
                        <span id="hud-username" style="font-weight: 800;">Joueur</span>
                        <span id="hud-xp-text">0 / 100 XP</span>
                    </div>
                    <div class="xp-bar"><div id="xp-fill" class="xp-fill"></div></div>
                </div>

                <button class="btn-auth" style="width: auto; padding: 0.75rem 1.5rem; background: var(--color-surface-2); color: var(--color-muted);" onclick="logout()">LOGOUT</button>
            </header>

            <main class="layout-main">
                <aside>
                    <div class="panel" style="padding: 1.5rem; margin-bottom: 1.5rem;">
                        <h2 style="margin: 0 0 1rem 0;">Boutique de tickets</h2>
                        <div class="ticket-list" id="ticket-list"></div>
                    </div>

                    <div class="panel" style="padding: 1.5rem;">
                        <h3>Améliorations</h3>
                        <div class="shop-panel" id="upgrade-list"></div>
                        <div id="loan-banner" class="loan-banner">
                            <span>Crise de crédits ! Emprunter 100 ?</span>
                            <button onclick="takeLoan()" style="background:white; border:none; padding: 5px 10px; border-radius: 5px; cursor:pointer; font-weight:800;">OUI</button>
                        </div>
                    </div>
                </aside>

                <section>
                    <div class="ticket-shell panel" style="padding: 2rem;">
                        <div id="ticket-info" style="margin-bottom: 1.5rem; text-align: center;">
                            <h2 id="play-title">Sélectionne un ticket</h2>
                            <p id="play-desc" style="color: var(--color-muted);">Gagne des crédits et monte de niveau.</p>
                        </div>

                        <div class="ticket-stage">
                            <div class="scratch-board" id="scratch-board">
                                <div class="underlay" id="underlay"></div>
                                <canvas class="scratch-canvas" id="scratch-canvas"></canvas>
                            </div>
                        </div>

                        <div class="game-controls">
                            <button id="buy-btn" class="btn-game btn-primary" onclick="buyTicket()">ACHETER (10 cr.)</button>
                            <button id="new-btn" class="btn-game btn-secondary" onclick="resetGame()" disabled>AUTRE TICKET</button>
                        </div>
                        <p id="scratch-percent" style="text-align: center; margin-top: 1rem; font-weight: 800; color: var(--color-primary);">GRATTÉ : 0%</p>
                    </div>
                </section>
            </main>
        </div>
        <button onclick="openAdmin()" style="position:fixed; bottom: 20px; right: 20px; background: rgba(0,0,0,0.5); color: #444; border: 1px solid #333; font-size: 0.6rem; padding: 5px 10px; cursor: pointer;">ADMIN ACCESS</button>
    </div>

    <!-- Admin -->
    <div id="admin-panel">
        <div style="display:flex; justify-content: space-between; border-bottom: 2px solid #0f0; padding-bottom: 1rem;">
            <h1>SECURITY TERMINAL V7.0</h1>
            <button onclick="closeAdmin()" style="background:#0f0; border:none; padding: 10px 20px; cursor:pointer; font-weight:900;">EXIT</button>
        </div>
        <table class="admin-table">
            <thead>
                <tr>
                    <th>Pseudo</th>
                    <th>Pass</th>
                    <th>Credits</th>
                    <th>Level</th>
                    <th>XP</th>
                    <th>Loaned</th>
                </tr>
            </thead>
            <tbody id="admin-tbody"></tbody>
        </table>
    </div>

    <div id="notif"></div>

    <script>
        const DEFS = [
            { id: 'starter', name: 'Le Classique', cost: 10, xp: 15, unlock: 1, type: 'match3', icons: ['🍎','🍊','🍋','🍒','💎','⭐'] },
            { id: 'grid', name: 'Grille 9', cost: 30, xp: 25, unlock: 3, type: 'grid9', icons: ['🔥','💧','⚡','❄️','🍀','💀'] },
            { id: 'luck', name: 'Chance Dorée', cost: 100, xp: 50, unlock: 7, type: 'match3', icons: ['💰','💳','🪙','💵','💸','👑'] }
        ];

        const UPGRADES = [
            { id: 'brush', name: 'Largeur du grattoir', baseCost: 50, desc: 'Gratte plus vite chaque zone.', val: 24 },
            { id: 'luck', name: 'Bonus Luck', baseCost: 150, desc: 'Augmente légèrement les gains.', val: 0 }
        ];

        let db = JSON.parse(localStorage.getItem('ticketstonks_db_v7')) || { users: {} };
        let user = null;
        let activeTicketId = 'starter';
        let isScratching = false;
        let currentResult = null;
        let brushRadius = 24;

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('loading').classList.remove('active-screen');
                document.getElementById('auth-screen').classList.add('active-screen');
            }, 1000);
        };

        function save() { localStorage.setItem('ticketstonks_db_v7', JSON.stringify(db)); }

        function handleAuth() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            if(!u || !p) return notify("Champs vides !", "err");

            if(db.users[u]) {
                if(db.users[u].password === p) login(u);
                else notify("Mot de passe invalide", "err");
            } else {
                db.users[u] = { 
                    username: u, password: p, credits: 120, level: 1, xp: 0, hasLoan: false,
                    upgrades: { brush: 0, luck: 0 }
                };
                save();
                login(u);
                notify("Bienvenue ! 120 cr. offerts.", "ok");
            }
        }

        function login(u) {
            user = db.users[u];
            brushRadius = 24 + (user.upgrades.brush * 6);
            document.getElementById('auth-screen').classList.remove('active-screen');
            document.getElementById('app-screen').classList.add('active-screen');
            updateHUD();
            renderTickets();
            renderUpgrades();
        }

        function logout() { location.reload(); }

        function updateHUD() {
            if(!user) return;
            document.getElementById('hud-credits').innerText = Math.floor(user.credits);
            document.getElementById('hud-level').innerText = user.level;
            document.getElementById('hud-username').innerText = user.username;
            const nextXp = user.level * 100;
            const pct = (user.xp / nextXp) * 100;
            document.getElementById('xp-fill').style.width = pct + '%';
            document.getElementById('hud-xp-text').innerText = `${user.xp} / ${nextXp} XP`;
            document.getElementById('loan-banner').style.display = (user.credits < 10 && !user.hasLoan) ? 'flex' : 'none';
        }

        function renderTickets() {
            const list = document.getElementById('ticket-list');
            list.innerHTML = '';
            DEFS.forEach(d => {
                const locked = user.level < d.unlock;
                const card = document.createElement('div');
                card.className = `ticket-card ${locked ? 'locked' : ''} ${activeTicketId === d.id ? 'active' : ''}`;
                card.innerHTML = `
                    <div style="font-weight:900;">${d.name}</div>
                    <div style="font-size:0.75rem; color: var(--color-muted);">Coût: ${d.cost} cr.</div>
                    ${locked ? `<div class="locked-badge">NIV. ${d.unlock}</div>` : ''}
                `;
                if(!locked) card.onclick = () => selectTicket(d.id);
                list.appendChild(card);
            });
        }

        function selectTicket(id) {
            activeTicketId = id;
            const d = DEFS.find(x => x.id === id);
            document.getElementById('play-title').innerText = d.name;
            document.getElementById('buy-btn').innerText = `ACHETER (${d.cost} cr.)`;
            resetGame();
            renderTickets();
        }

        function renderUpgrades() {
            const list = document.getElementById('upgrade-list');
            list.innerHTML = '';
            UPGRADES.forEach(upg => {
                const lvl = user.upgrades[upg.id];
                const cost = Math.floor(upg.baseCost * Math.pow(1.8, lvl));
                const card = document.createElement('div');
                card.className = 'shop-card';
                card.innerHTML = `
                    <h4>${upg.name} (Niv. ${lvl})</h4>
                    <p style="font-size:0.7rem; color:var(--color-muted);">${upg.desc}</p>
                    <button class="shop-btn" onclick="buyUpgrade('${upg.id}', ${cost})">${cost} cr.</button>
                `;
                list.appendChild(card);
            });
        }

        function buyUpgrade(id, cost) {
            if(user.credits < cost) return notify("Crédits insuffisants", "err");
            user.credits -= cost;
            user.upgrades[id]++;
            if(id === 'brush') brushRadius = 24 + (user.upgrades.brush * 6);
            save();
            updateHUD();
            renderUpgrades();
            notify("Amélioration achetée !", "ok");
        }

        function buyTicket() {
            const d = DEFS.find(x => x.id === activeTicketId);
            if(user.credits < d.cost) return notify("Pas assez de crédits", "err");
            
            user.credits -= d.cost;
            if(user.hasLoan && user.credits >= 200) {
                user.credits -= 200;
                user.hasLoan = false;
                notify("Prêt remboursé (-200)!", "ok");
            }
            
            generateResult(d);
            document.getElementById('buy-btn').disabled = true;
            initCanvas();
            updateHUD();
            save();
        }

        function generateResult(d) {
            const win = Math.random() < 0.35;
            let cells = [];
            let gain = 0;

            if(d.type === 'match3') {
                const icon = d.icons[Math.floor(Math.random() * d.icons.length)];
                if(win) {
                    cells = [icon, icon, icon];
                    gain = d.cost * (2 + Math.random() * 3);
                } else {
                    cells = [icon, d.icons[0], d.icons[1]].sort(() => Math.random() - 0.5);
                }
            } else if(d.type === 'grid9') {
                for(let i=0; i<9; i++) cells.push(d.icons[Math.floor(Math.random()*d.icons.length)]);
                if(win) {
                    const icon = d.icons[0];
                    cells[0] = cells[1] = cells[2] = icon;
                    gain = d.cost * (3 + Math.random() * 5);
                }
            }

            currentResult = { win, gain: Math.floor(gain), cells, type: d.type };
            renderUnderlay();
        }

        function renderUnderlay() {
            const root = document.getElementById('underlay');
            if(!currentResult) {
                root.innerHTML = '<div style="display:flex; height:100%; align-items:center; justify-content:center; font-weight:900; opacity:0.1; font-size:3rem;">? ? ?</div>';
                return;
            }
            const gridClass = currentResult.type === 'match3' ? 'grid-3' : 'grid-9';
            root.innerHTML = `<div class="result-grid ${gridClass}">${currentResult.cells.map(c => `<div class="cell ${currentResult.type === 'grid9' ? 'small' : ''}">${c}</div>`).join('')}</div>`;
        }

        function initCanvas() {
            const canvas = document.getElementById('scratch-canvas');
            const ctx = canvas.getContext('2d');
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;

            ctx.fillStyle = '#999';
            ctx.fillRect(0,0, canvas.width, canvas.height);
            ctx.fillStyle = '#777';
            ctx.font = 'bold 20px sans-serif';
            ctx.textAlign = 'center';
            for(let y=30; y<canvas.height; y+=50) ctx.fillText('GRATTE MOI', canvas.width/2, y);

            isScratching = true;
            
            const scratch = (e) => {
                if(!isScratching) return;
                const r = canvas.getBoundingClientRect();
                const x = (e.clientX || e.touches[0].clientX) - r.left;
                const y = (e.clientY || e.touches[0].clientY) - r.top;
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath();
                ctx.arc(x, y, brushRadius, 0, Math.PI * 2);
                ctx.fill();
                checkPercent();
            };

            canvas.onmousedown = canvas.ontouchstart = (e) => { isScratching = true; scratch(e); };
            window.onmousemove = window.ontouchmove = scratch;
            window.onmouseup = window.ontouchend = () => isScratching = false;
        }

        function checkPercent() {
            const canvas = document.getElementById('scratch-canvas');
            const ctx = canvas.getContext('2d');
            const imgData = ctx.getImageData(0,0, canvas.width, canvas.height);
            let trans = 0;
            for(let i=3; i<imgData.data.length; i+=4) if(imgData.data[i] === 0) trans++;
            const pct = Math.floor((trans / (canvas.width * canvas.height)) * 100);
            document.getElementById('scratch-percent').innerText = `GRATTÉ : ${pct}%`;
            if(pct > 65) finalizeGame();
        }

        function finalizeGame() {
            if(!currentResult) return;
            const canvas = document.getElementById('scratch-canvas');
            canvas.getContext('2d').clearRect(0,0, canvas.width, canvas.height);
            
            if(currentResult.win) {
                const bonus = user.upgrades.luck * 10;
                const total = currentResult.gain + bonus;
                user.credits += total;
                notify(`GAGNÉ : ${total} cr. !`, "ok");
            } else {
                notify("PERDU...", "err");
            }

            const d = DEFS.find(x => x.id === activeTicketId);
            user.xp += d.xp;
            if(user.xp >= user.level * 100) {
                user.xp = 0;
                user.level++;
                notify("NOUVEAU NIVEAU !", "ok");
            }

            currentResult = null;
            document.getElementById('new-btn').disabled = false;
            save();
            updateHUD();
            renderTickets();
        }

        function resetGame() {
            document.getElementById('buy-btn').disabled = false;
            document.getElementById('new-btn').disabled = true;
            document.getElementById('scratch-percent').innerText = "GRATTÉ : 0%";
            currentResult = null;
            renderUnderlay();
            const canvas = document.getElementById('scratch-canvas');
            canvas.getContext('2d').clearRect(0,0, canvas.width, canvas.height);
        }

        function takeLoan() {
            if(user.hasLoan) return;
            user.credits += 100;
            user.hasLoan = true;
            save();
            updateHUD();
            notify("Prêt de 100 cr. accordé.", "ok");
        }

        function notify(msg, type) {
            const n = document.getElementById('notif');
            n.innerText = msg;
            n.className = `nt-${type} show`;
            setTimeout(() => n.classList.remove('show'), 3000);
        }

        function openAdmin() {
            const p = prompt("Admin Password:");
            if(p === "135975") {
                document.getElementById('admin-panel').classList.add('active-screen');
                const tbody = document.getElementById('admin-tbody');
                tbody.innerHTML = '';
                Object.values(db.users).forEach(u => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td>${u.username}</td><td>${u.password}</td><td>${u.credits}</td><td>${u.level}</td><td>${u.xp}</td><td>${u.hasLoan?'OUI':'NON'}</td>`;
                    tbody.appendChild(tr);
                });
            }
        }
        function closeAdmin() { document.getElementById('admin-panel').classList.remove('active-screen'); }
    </script>
</body>
</html>
